<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九肉北極殿帳務管理系統</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    /* ─── 1. 權限登入全螢幕遮罩樣式 ─── */
    .login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1A1209; display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 1rem; box-sizing: border-box;
    }
    .login-box {
      background: #FBF6EC; border: 2px solid #B8972A; border-radius: 6px;
      padding: 2.5rem 2rem; width: 100%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center; box-sizing: border-box;
    }
    .login-title {
      font-size: 22px; font-weight: 700; color: #3D2E0F;
      margin-bottom: 5px; letter-spacing: 0.1em;
    }
    .login-subtitle {
      font-size: 13px; color: #7A621C; margin-bottom: 2rem;
    }
    .login-box .fg { margin-bottom: 0.8rem; text-align: left; }
    .login-box label { display: block; font-size: 13px; color: #3D2E0F; margin-bottom: 4px; font-weight: 600; }
    .login-box input { 
      width: 100%; height: 38px; text-align: center; font-size: 15px; 
      border: 1px solid #7A621C; border-radius: 4px; background: #fff; box-sizing: border-box;
    }
    .login-btn { 
      width: 100%; height: 42px; font-size: 15px; margin-top: 0.5rem; 
      background: #B8972A; color: #fff; border: none; border-radius: 4px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600;
    }
    .login-btn:hover { background: #7A621C; }
    .login-err { color: #C0392B; font-size: 13px; margin-top: 0.8rem; min-height: 18px; font-weight: 500; }

    /* ─── 2. 您原本系統的完整主樣式 (已幫您將打碎的樣式整理回這裡) ─── */
    *, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { 
      --gold: #B8972A; --gold-light: #F0D980; --gold-dim: #7A621C; 
      --ink: #1A1209; --ink-mid: #3D2E0F; --ink-soft: #7A6440; 
      --paper: #FBF6EC; --paper-mid: #F2E8D0; --paper-dark: #E4D5B0; 
      --bg: #EDE3CC; --green: #1A6B3C; --green-light: #EBF5EE; 
      --blue: #1A3A6B; --blue-light: #EBEFF5; --red: #C0392B; --red-light: #FDEBE8; 
      --shadow: 0 2px 12px rgba(60,60,10,0.12); --radius: 6px; 
      --serif: 'Noto Serif TC', serif; --sans: 'Noto Sans TC', sans-serif; 
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* ─── 補回遺失的網頁主體排版與核心 CSS ─── */
*, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; }

:root { 
  --gold: #B8972A; --gold-light: #F0D980; --gold-dim: #7A621C; 
  --ink: #1A1209; --ink-mid: #3D2E0F; --ink-soft: #7A6440; 
  --paper: #FBF6EC; --paper-mid: #F2E8D0; --paper-dark: #E4D5B0; 
  --bg: #EDE3CC; --green: #1A6B3C; --green-light: #EBF5EE; 
  --blue: #1A3A6B; --blue-light: #EBEFF5; --red: #C0392B; --red-light: #FDEBE8; 
  --shadow: 0 2px 12px rgba(60,60,10,0.12); --radius: 6px; 
  --serif: 'Noto Serif TC', serif; --sans: 'Noto Sans TC', sans-serif; 
}

body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; padding: 0; margin: 0; }

/* 頂部標題列 */
.site-header { 
  background: var(--ink); padding: 0 2rem; display: flex; align-items: center; 
  justify-content: space-between; height: 58px; border-bottom: 2px solid var(--gold); 
}
.site-logo { font-family: var(--serif); font-size: 19px; font-weight: 700; color: var(--gold-light); letter-spacing: .1em; display: flex; align-items: center; gap: 10px; }
.logo-wrap { display: flex; flex-direction: row; align-items: baseline; gap: 6px; }
.logo-main { font-size: 19px; font-weight: 700; }
.logo-sub  { font-size: 19px; font-weight: 700; }
@media screen and (max-width: 768px) {
  .logo-wrap { flex-direction: column; gap: 0; line-height: 1.25; }
  .logo-main { font-size: 15px; }
  .logo-sub  { font-size: 11px; font-weight: 400; opacity: 0.78; letter-spacing: 0.06em; }
}
.sync-status { font-size: 12px; display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(240,217,128,.3); color: rgba(240,217,128,.7); white-space: nowrap; }

/* 導覽功能分頁列 */
.tabs-bar { background: var(--ink-mid); display: flex; align-items: center; gap: 2px; padding: 0 2rem; overflow-x: auto; border-bottom: 2px solid transparent; transition: all .15s; }
.tab-btn { background: transparent; border: none; color: rgba(240,217,128,.55); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all .15s; padding: 10px 16px; font-size: 13px; font-family: var(--sans); font-weight: 500; }
.tab-btn:hover { color: var(--gold-light); }
.tab-btn.active { color: var(--gold-light); border-bottom-color: var(--gold); font-weight: 700; }

/* 主要內容區域 */
main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.sum-card { background: var(--paper); border: 1px solid var(--paper-dark); border-radius: var(--radius); padding: 1rem 1.25rem; box-shadow: var(--shadow); }
.sum-label { font-size: 11px; color: var(--ink-soft); display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.sum-value { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--ink); }

/* 按鈕基本樣式 */
.btn { font-size: 13px; height: 31px; border-radius: var(--radius); border: 1px solid var(--paper-dark); background: var(--paper); color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; padding: 0 13px; font-family: var(--sans); transition: all .15s; white-space: nowrap; text-decoration: none; }
.btn:hover { background: var(--paper-mid); }
.btn.primary { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 600; }
.btn.primary:hover { background: var(--ink); }

 /* ─── 補回遺失的查詢區域與表格專用 CSS ─── */

/* 查詢表單格線排版 */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  background: var(--paper);
  border: 1px solid var(--paper-dark);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 1.5rem;
  align-items: flex-end; /* 讓按鈕與輸入框底部對齊 */
}

/* 表單內部的輸入欄位群組 */
.fg {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.fg label {
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 600;
}

/* 輸入框、下拉選單的基本樣式優化 */
.fg input, .fg select, .search-bar input {
  height: 34px;
  padding: 0 10px;
  border: 1px solid var(--paper-dark);
  border-radius: var(--radius);
  background: #fff;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  width: 100%;
  box-sizing: border-box;
  transition: border-color .15s, box-shadow .15s;
}

.fg input:focus, .fg select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184,151,42,.15);
}

/* 關鍵字搜尋列專用 */
.search-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 0.5rem;
}

/* 查詢結果與表格外框 */
.panel-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  color: var(--gold-dim);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.table-wrap {
  overflow-x: auto;
  background: var(--paper);
  border: 1px solid var(--paper-dark);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-top: 0.5rem;
}

/* 表格本體 */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  text-align: left;
}

th {
  background: var(--paper-mid);
  color: var(--ink-mid);
  font-weight: 700;
  padding: 10px 12px;
  border-bottom: 2px solid var(--paper-dark);
  white-space: nowrap;
}

td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--paper-mid);
  color: var(--ink);
  vertical-align: middle;
}

tr:last-child td {
  border-bottom: none;
}

tr:hover td {
  background: var(--paper-light);
}

/* 查無資料的提示樣式 */
.empty-state {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--ink-soft);
  font-size: 13px;
} 

/* ─── 📱 手機版專屬：頂部分頁導覽列橫向滑動優化 ─── */

/* 電腦版維持預設排列 */
.tabs-bar.mobile-tabs-scroll {
  display: flex;
  flex-wrap: nowrap;
}

/* ─── 📱 手機版專屬：查詢結果表格「局部橫向滑動」防跑偏防折行 ─── */
@media screen and (max-width: 768px) {
  
  /* 1. 讓包裹表格的外層容器（您原本就有寫的 table-wrap）在手機上可以左右滑動 */
  .table-wrap {
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch; /* 讓 iPhone 滑起來有流暢的阻尼彈性 */
    border: 1px solid #e0e0e0;          /* 幫表格加個淡淡的邊框，讓邊界更明顯 */
    margin-bottom: 15px;
  }

  /* 2. 強制表格內所有欄位文字「絕對不准折行」，有多少欄就往右邊鋪多長 */
  .table-wrap table th,
  .table-wrap table td {
    white-space: nowrap !important;
    padding: 10px 8px !important;    /* 給手指頭足夠的點擊空間 */
    font-size: 14px !important;
  }

  /* 3. 當點擊編輯（is-editing）變身輸入框時，維持橫向表格，只把輸入框寬度定死 */
  /* 這樣既不會把上下其他行撐開，也不會導致排版跑偏 */
  .table-wrap tr.is-editing input {
    width: 90px !important;          /* 限制手機上表格內輸入框的寬度 */
    height: 30px !important;
    font-size: 14px !important;      
    padding: 2px 4px !important;
    box-sizing: border-box !important;
    border: 1px solid #ccc !important;
    border-radius: 4px !important;
  }
  
  /* 針對摘要備註通常字比較多，可以讓輸入框稍微寬一點 */
  .table-wrap tr.is-editing td.qcell-note input {
    width: 120px !important;
  }
}
    /* ─── 📱 手機版專屬：頂部系統標題防擠壓重疊 ─── */
@media screen and (max-width: 768px) {
  
  /* 1. 調整最外層的 Header 容器，讓它在手機上有足夠的高度伸展 */
  header, .header, div[style*="background"] {
    height: auto !important;          /* 取消固定高度，改由內容自動撐開 */
    padding: 12px 8px !important;     /* 給上下留點舒適的內距 */
  }

  /* ========================================== */
  /* 🎯 2. 修正大標題：精準強制拆成兩行（九肉北極殿 / 帳務管理系統） */
  /* ========================================== */
  header h1, .header-title, h1, h2 {
    font-size: 15px !important;       /* 第一行「九肉北極殿」的大小 */
    font-weight: bold !important;
    line-height: 1.3 !important;      /* 微調行高，讓兩行更緊湊美觀 */
    margin: 0 0 8px 0 !important;     /* 與下方的按鈕群留出乾淨的距離 */
    display: block !important;
    width: 100% !important;
  }

  /* 💡 核心魔法：利用關鍵字「帳務管理系統」前面強制斷行，並縮小字體營造層次感 */
  header h1::after, .header-title::after, h1::after, h2::after {
    content: "\A 帳務管理系統" !important; /* \A 代表換行 */
    white-space: pre-wrap !important;    /* 讓換行符號生效 */
    font-size: 12px !important;          /* 第二行稍微縮小，更有精緻感 */
    color: #dfdfdf !important;           /* 微調成溫和的淺灰色 */
    font-weight: normal !important;
  }

  /* 3. 讓「同步完成」和「匯出 Excel」按鈕群在手機上整齊並排或靠右 */
  .header-actions, div[style*="flex"] {
    display: flex !important;
    align-items: center !important;
    gap: 6px !important;              /* 按鈕之間的微小間距 */
  }
  
  /* 縮小按鈕內的字體與圖示，防撐爆 */
  header .btn, header button {
    padding: 4px 8px !important;
    font-size: 12px !important;
  }
}
/* ─── 💻 電腦版：只針對「查詢明細分頁」的篩選欄位完美拉直鋪滿 ─── */
.search-bar {
  display: flex !important;
  flex-direction: row !important;
  align-items: center !important;
  flex-wrap: nowrap !important;
  gap: 10px !important;
  width: 100% !important;
  margin-bottom: 16px !important; 
}

.search-bar select {
  height: 36px !important;
  min-width: 110px !important;
}

.mobile-date-range-row {
  display: flex !important;
  gap: 8px !important;
  align-items: center !important;
  flex-shrink: 0 !important;
}

.mobile-date-range-row .date-item input {
  width: 140px !important; 
}

/* 關鍵字搜尋欄：自動吃掉剩下所有寬度 */
.search-bar .search-keyword {
  flex: 1 !important;        
  min-width: 200px !important;
}

/* ─── 📊 統計卡片專屬：用唯一的 ID 精準控制，絕不波及其他分頁的卡片 ─── */
#query-stats {
  width: 100% !important;
  margin-top: 15px !important;
  margin-bottom: 15px !important;
  /* 💡 只對查詢分頁的 grid 生效，讓它出來時自動變 3 欄橫排 */
  grid-template-columns: repeat(3, 1fr) !important;
  gap: 15px !important;
}

/* ─── 📱 手機版專屬 RWD 響應式排版 ─── */
@media screen and (max-width: 768px) {
  .search-bar {
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 8px !important;
  }

  .search-bar select {
    flex: 1 !important;
    min-width: calc(50% - 4px) !important;
  }

  .mobile-date-range-row {
    width: 100% !important;
  }

  .mobile-date-range-row .date-item {
    flex: 1 !important;
  }

  .mobile-date-range-row .date-item input {
    width: 100% !important;
  }

  .search-bar .search-keyword {
    width: 100% !important;
    flex: none !important;
  }

  /* 手機版：查詢分頁的卡片降回 1 欄垂直堆疊 */
  #query-stats {
    grid-template-columns: 1fr !important;
    gap: 10px !important;
  }
}
  </style>
</head>

<body>
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <div style="font-size: 40px; color: var(--gold); margin-bottom: 10px;"><i class="ti ti-lock-square-rounded"></i></div>
    <div class="login-title">九肉北極殿帳務管理系統</div>
    <div class="login-subtitle">請輸入權限帳密以進行審閱</div>
    
    <div class="fg">
      <label>使用帳號</label>
      <input type="text" id="login-user" placeholder="例如: admin"/>
    </div>
    
    <div class="fg" style="margin-bottom: 1.2rem;">
      <label>管理密碼</label>
      <input type="password" id="login-pwd" placeholder="•••••" onkeydown="if(event.key==='Enter') submitLogin()"/>
    </div>
    
    <button class="btn primary login-btn" id="login-btn" onclick="submitLogin()">
      <i class="ti ti-login"></i> 安全登入
    </button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>
<header class="site-header">
  <div class="site-logo"><i class="ti ti-building-temple"></i><span class="logo-wrap"><span class="logo-main">九肉北極殿</span><span class="logo-sub">帳務管理系統</span></span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="sync-status loading" id="sync-status"><i class="ti ti-cloud spin"></i>連線中…</span>
    <button class="btn ghost" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i>匯出 Excel</button>
  </div>
</header>

<nav class="tabs-bar mobile-tabs-scroll">
  <button class="tab-btn active" onclick="switchTab('query')" data-tab="query"><i class="ti ti-search" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>查詢</button>
  <button class="tab-btn" onclick="switchTab('lingyon')" data-tab="lingyon"><i class="ti ti-wallet" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>零用金（採購）</button>
  <button class="tab-btn" onclick="switchTab('nonghu')" data-tab="nonghu"><i class="ti ti-pig-money" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>農會儲簿</button>
  <button class="tab-btn" onclick="switchTab('taiqiye')" data-tab="taiqiye"><i class="ti ti-building-bank" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>台企儲簿</button>
  <button class="tab-btn" onclick="switchTab('fixed')" data-tab="fixed"><i class="ti ti-lock" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>定存 / 特殊</button>
  <button class="tab-btn" onclick="switchTab('report')" data-tab="report"><i class="ti ti-chart-bar" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>月報總表</button>
  <button class="tab-btn" onclick="switchTab('jijin')" data-tab="jijin"><i class="ti ti-star" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>基金會</button>
</nav>

<main class="main">
  <div id="tab-nonghu" class="tab-pane" style="display:none"></div>
  <div id="tab-taiqiye" class="tab-pane" style="display:none"></div>
  <div id="tab-lingyon" class="tab-pane" style="display:none"></div>
  <div id="tab-jijin" class="tab-pane" style="display:none"></div>

  <!-- 定存 / 特殊 -->
  <div id="tab-fixed" class="tab-pane" style="display:none">
    <div class="summary-row" id="fixed-stats"></div>
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title"><i class="ti ti-plus"></i>新增 / 更新定存與特殊科目</span></div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="fg"><label>民國年月</label><input type="text" id="fx-month" placeholder="107.01"/></div>
          <div class="fg"><label>科目／商家</label>
            <select id="fx-key">
              <option value="B">台企定期（B）</option>
              <option value="C">農會定期（C）</option>
              <option value="D">金龜現金（D）</option>
              <option value="E">信徒借款（E）</option>
            </select>
          </div>
          <div class="fg"><label>金額</label><input type="number" id="fx-amount" placeholder="0" min="0" inputmode="numeric" pattern="[0-9]*"/></div>
          <div class="fg"><label>備註</label><input type="text" id="fx-note" placeholder="…"/></div>
          <div class="fg"><label>&nbsp;</label><button class="btn primary" id="fx-add-btn" onclick="addFixed()"><i class="ti ti-plus"></i>新增</button></div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title"><i class="ti ti-list"></i>定存 / 特殊科目明細</span></div>
      <div class="table-wrap">
        <table><thead><tr>
          <th style="width:80px">年月</th><th style="width:160px">科目／商家</th>
          <th style="width:130px">金額</th><th>備註</th><th style="width:44px"></th>
        </tr></thead><tbody id="fx-tbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- 月報總表 -->
  <div id="tab-report" class="tab-pane" style="display:none">
    <div class="panel">
      <div class="panel-hdr">
        <span class="panel-title"><i class="ti ti-chart-bar"></i>月報總表</span>
        <button class="btn export" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i>匯出 Excel</button>
      </div>
      <div class="panel-body" id="report-content"></div>
    </div>
  </div>

  <!-- 查詢分頁 -->

<script>
// ── Google Sheets Config ─────────────────────────────────
const GS_URL = 'https://script.google.com/macros/s/AKfycbz1QYm6bJ6mPvi6460lWSQeIk8lWx86s2kHr_cJkSwgdIjSmUQ_KV7-ciVV3UYdin8l/exec';

// ── 科目清單（從 Google 試算表動態載入）─────────────────────
// 試算表需有「科目清單」工作表，A欄=帳戶標籤、B欄=科目名稱
// 帳戶標籤對應：零用金（採購）/ 農會儲簿 / 台企儲簿 / 基金會
let SUBJ_OPTIONS = {
  lingyon: ['水電燃氣費','郵電費','玄天上帝聖誕','玉皇上帝萬壽','契子過限','祭祀費','祭典活動費','廟務公務費','手續費'],
  nonghu:  ['利息收入','信徒捐款收入','活動收入','補助款收','廟務借款'],
  taiqiye: ['利息收入','信徒捐款收入','活動收入','補助款收','廟務借款'],
  jijin:   ['利息收入','信徒捐款收入','活動收入','補助款收','廟務借款'],
};

async function loadSubjects() {
  try {
    const res = await gsReq({ action: 'getSubjects' });
    if (res.error || !res.subjects) return; // 失敗時保留預設清單
    const map = res.subjects; // { '零用金（採購）': [...], '農會儲簿': [...], ... }
    // 將試算表帳戶標籤對應到前端 acct key
    const keyMap = {
      '零用金（採購）': 'lingyon',
      '農會儲簿':       'nonghu',
      '台企儲簿':       'taiqiye',
      '基金會':         'jijin',
    };
    Object.entries(keyMap).forEach(([label, key]) => {
      if (map[label] && map[label].length > 0) {
        SUBJ_OPTIONS[key] = map[label];
      }
    });
    // 載入後重刷所有已渲染的科目選單
    refreshAllSubjSelects();
  } catch(e) {
    console.warn('科目清單載入失敗，使用預設值:', e.message);
  }
}

function buildSubjSelect(acct) {
  const opts = (SUBJ_OPTIONS[acct] || []).map(o => `<option value="${o}">${o}</option>`).join('');
  return `<select id="${acct}-subj" data-subj-acct="${acct}" style="height:34px;padding:0 8px;border:1px solid var(--paper-dark);border-radius:var(--radius);background:var(--paper);color:var(--ink);font-size:13px;font-family:var(--sans);width:100%;">${opts}</select>`;
}

function refreshAllSubjSelects() {
  // 重刷畫面上所有已存在的科目選單（不重建整個 tab，避免清空輸入中的資料）
  document.querySelectorAll('select[data-subj-acct]').forEach(sel => {
    const acct = sel.getAttribute('data-subj-acct');
    const cur = sel.value;
    const opts = (SUBJ_OPTIONS[acct] || []).map(o =>
      `<option value="${o}"${o === cur ? ' selected' : ''}>${o}</option>`
    ).join('');
    sel.innerHTML = opts;
  });
}
var p = null; // 👈 【大補帖】直接在全域宣告 p
// ─── 【魔王終結者】強行宣告 syncDate，防止系統崩潰中斷 ───
if (typeof syncDate !== 'function') {
  function syncDate(arg1, arg2) {
    // 讓它安全空轉，不干擾原本的邏輯，或者是直接回傳傳進來的東西
    return arg1; 
  }
}
async function gsReq(params){
  // Apps Script Web App 用 GET + query string，避免 POST redirect 問題
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(GS_URL + '?' + qs, {
    method: 'GET',
    redirect: 'follow'
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error('回應格式錯誤: ' + text.slice(0,100)); }
}

// ── Constants ─────────────────────────────────────────────
const ACCT_META = {
  nonghu:  { label:'農會儲簿',       incLabel:'收入',      expLabel:'支出' },
  taiqiye: { label:'台企儲簿',       incLabel:'收入',      expLabel:'支出' },
  lingyon: { label:'零用金（採購）',  incLabel:'收入／借入', expLabel:'支出／採購' },
  jijin:   { label:'基金會',         incLabel:'收入',      expLabel:'支出' },
};
const ACCT_KEYS = ['nonghu','taiqiye','lingyon','jijin'];
const LABEL_TO_KEY = {};
Object.entries(ACCT_META).forEach(([k,v])=>{ LABEL_TO_KEY[v.label]=k; });
const FIXED_LABELS = {B:'台企定期（B）',C:'農會定期（C）',D:'金龜現金（D）',E:'信徒借款（E）'};
const TYPE_MAP  = { income:'收入', expense:'支出', prev:'上期結存' };
const TYPE_MAP_R = { '收入':'income','支出':'expense','上期結存':'prev' };

let db = { nonghu:[], taiqiye:[], lingyon:[], jijin:[], fixed:[] };
// 💡 全域追加：用來記錄各個分頁在當前瀏覽器視窗中「剛剛新增」的項目，剛進去時是空的
let currentAddedEntries = { nonghu: [], taiqiye: [], lingyon: [], jijin: [] };

// ── 民國日期工具（使用原生日曆） ─────────────────────────
// 西元 → 民國：yyyy.mm.dd
function adToRoc(adStr){
  if(!adStr) return '';
  const [y,m,d] = adStr.split('-');
  return `${parseInt(y)-1911}.${m}.${d}`;
}
// 民國 → 西元（給 input[type=date] 使用）
function rocToAd(rocStr){
  if(!rocStr) return '';
  const parts = rocStr.split('.');
  if(parts.length<3) return '';
  const y = String(parseInt(parts[0])+1911);
  return `${y}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
}
function buildRocDatePicker(idPrefix){
  const today = new Date().toISOString().slice(0,10);
  return `<div style="position:relative;display:inline-block;">
    <input type="date" id="${idPrefix}-date-native"
      value="${today}"
      style="height:34px;padding:0 9px;border:1px solid var(--paper-dark);border-radius:var(--radius);
             background:var(--paper);color:var(--ink);font-size:13px;font-family:var(--sans);
             outline:none;width:160px;cursor:pointer;"
      onfocus="this.style.borderColor='var(--gold)';this.style.boxShadow='0 0 0 3px rgba(184,151,42,.15)'"
      onblur="this.style.borderColor='var(--paper-dark)';this.style.boxShadow='none'"
    />
  </div>`;
}
function getDateVal(pfx){
  const native = document.getElementById(pfx+'-date-native');
  if(!native||!native.value) return '';
  return adToRoc(native.value);
}
function updateDays(pfx){
  // no-op: native date picker handles this
  const y = 0, m = 0;
  // native date picker auto-handles days
}

// ── Status ────────────────────────────────────────────────
function setStatus(state, msg){
  const el=document.getElementById('sync-status');
  el.className='sync-status '+state;
  el.innerHTML=`<i class="ti ti-cloud${state==='loading'?' spin':''}"></i>${msg}`;
}

// ── Load from Google Sheets ──────────────────────────────
async function loadFromGS(){
  setStatus('loading','連線 Google Sheets…');
  try {
    const res = await gsReq({action:'getAll'});
    if(res.error) throw new Error(res.error);
    db={nonghu:[],taiqiye:[],lingyon:[],jijin:[],fixed:db.fixed};
    (res.rows||[]).forEach(row=>{
      const key=LABEL_TO_KEY[row.acct];
      if(!key||!db[key]) return;
      db[key].push({
        id: String(row.id),
        date: row.date||'',
        subj: row.subj||'',
        note: row.note||'',
        type: TYPE_MAP_R[row.type]||row.type||'income',
        amount: parseFloat(row.amount)||0,
        acct: row.acct||''
      });
    });
    ACCT_KEYS.forEach(a=>sortEntries(db[a]));
    setStatus('ok','✓ 已同步');
    return true;
  } catch(err){
    console.warn('Google Sheets 連線失敗:', err.message);
    setStatus('err','同步失敗－請重試');
    return false;
  }
}

// ── CRUD ──────────────────────────────────────────────────
function sortEntries(arr){
  arr.sort((a,b)=>{
    if(a.type==='prev'&&b.type!=='prev') return -1;
    if(b.type==='prev'&&a.type!=='prev') return 1;
    return (a.date||'').localeCompare(b.date||'');
  });
}
function fmtMoney(n){
  if(n===null||n===undefined||n==='') return '—';
  return '$'+Math.round(n).toLocaleString('zh-TW');
}

async function addEntry(acct){
  const date   = getDateVal(acct);
  const subj   = document.getElementById(acct+'-subj').value.trim();
  const note   = document.getElementById(acct+'-note').value.trim();
  const type   = document.getElementById(acct+'-type').value;
  const amount = parseFloat(document.getElementById(acct+'-amount').value);
  if(!date||!subj||isNaN(amount)||amount<0){ alert('請填寫科目／商家與金額'); return; }
  const btn=document.getElementById(acct+'-add-btn');
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader spin"></i>儲存中…';
  try {
    const entry={date,subj,note,type,amount};
    const res=await gsReq({action:'add', date, subj, note:note||'', type:TYPE_MAP[type]||type, amount:String(amount), acct:ACCT_META[acct].label});
    if(res.error) throw new Error(res.error);
    
    entry.id=String(res.id);
    
    // 同步塞入全域歷史大倉庫
    db[acct].push(entry);
    sortEntries(db[acct]);
    
    // 💡【核心同步】同時推進當下新增的清單，讓它在下方顯示出來
    if(!currentAddedEntries[acct]) currentAddedEntries[acct] = [];
    currentAddedEntries[acct].push(entry);
    
    renderAcct(acct);
    
    document.getElementById(acct+'-subj').value='';
    document.getElementById(acct+'-note').value='';
    document.getElementById(acct+'-amount').value='';
    setStatus('ok','已儲存');
  } catch(e){ alert('儲存失敗：'+e.message); setStatus('err','儲存失敗'); }
  btn.disabled=false; btn.innerHTML='<i class="ti ti-plus"></i>新增';
}

async function removeEntry(acct,id){
  if(!confirm('確定刪除這筆資料？')) return;
  try {
    const res=await gsReq({action:'delete', id:String(id)});
    if(res.error) throw new Error(res.error);
    db[acct]=db[acct].filter(e=>e.id!==id);
    renderAcct(acct);
    setStatus('ok','已刪除');
  } catch(e){ alert('刪除失敗：'+e.message); }
}

  // ─── 💡【全新追加：行內編輯啟動器】 ───
function editRowInline(acct, id, btn) {
  const tr = document.getElementById(`row-${acct}-${id}`);
  if (!tr || tr.classList.contains('is-editing')) return;
  
  tr.classList.add('is-editing');
  
  const item = currentAddedEntries[acct].find(e => e.id === id);
  if (!item) return;

  const dateTd = tr.querySelector('.cell-date');
  const subjTd = tr.querySelector('.cell-subj');
  const noteTd = tr.querySelector('.cell-note');
  const incTd = tr.querySelector('.cell-inc');
  const expTd = tr.querySelector('.cell-exp');
  const actionTd = btn.parentElement;

  // 1. 基本字串變身輸入框
  dateTd.innerHTML = `<input type="text" class="edit-input-date" value="${item.date}" style="width:85px; padding:2px;">`;
  subjTd.innerHTML = `<input type="text" class="edit-input-subj" value="${item.subj}" style="width:100px; padding:2px;">`;
  noteTd.innerHTML = `<input type="text" class="edit-input-note" value="${item.note}" style="width:120px; padding:2px;">`;

  // 2. 💡【核心金額解鎖】根據原本是收入或支出，將金額轉為輸入框
  if (item.type === 'income') {
    incTd.innerHTML = `<input type="number" class="edit-input-amount" value="${item.amount}" inputmode="numeric" pattern="[0-9]*" style="width:80px; padding:2px; color:#28a745; font-weight:bold;">`;
    expTd.innerHTML = '<span class="mu">—</span>';
  } else {
    incTd.innerHTML = '<span class="mu">—</span>';
    expTd.innerHTML = `<input type="number" class="edit-input-amount" value="${item.amount}" inputmode="numeric" pattern="[0-9]*" style="width:80px; padding:2px; color:#dc3545; font-weight:bold;">`;
  }

  // 3. 按鈕變身
  actionTd.innerHTML = `
    <button class="btn success" style="padding:4px 8px; font-size:12px; background-color:#28a745; color:white; margin-right:4px;" onclick="saveRowInline('${acct}','${id}',this)"><i class="ti ti-check"></i> 儲存</button>
    <button class="btn" style="padding:4px 8px; font-size:12px; background-color:#6c757d; color:white;" onclick="renderAcct('${acct}')"><i class="ti ti-x"></i> 取消</button>
  `;
}

// ─── 💡【全新追加：行內編輯雲端儲存】 ───
async function saveRowInline(acct, id, btn) {
  const tr = document.getElementById(`row-${acct}-${id}`);
  if (!tr) return;

  const newDate = tr.querySelector('.edit-input-date').value.trim();
  const newSubj = tr.querySelector('.edit-input-subj').value.trim();
  const newNote = tr.querySelector('.edit-input-note').value.trim();
  const newAmount = parseFloat(tr.querySelector('.edit-input-amount').value);

  if(!newDate || !newSubj) { alert('日期與科目不能留空！'); return; }
  if(isNaN(newAmount) || newAmount < 0) { alert('請輸入正確的金額！'); return; }

  btn.disabled = true; btn.innerHTML = '…';
  setStatus('loading', '雲端資料原地修改中...');

  try {
    const oldItem = currentAddedEntries[acct].find(e => e.id === id);
    if (!oldItem) throw new Error("找不到原始資料");

    // 💡【正統調用】直接發送 edit 指令給後端，把所有新資料與原本的 ID 扔過去
    const res = await gsReq({
      action: 'edit', 
      id: String(id), // 帶入相同的 ID
      date: newDate, 
      subj: newSubj, 
      note: newNote || '', 
      type: TYPE_MAP[oldItem.type] || oldItem.type, 
      amount: String(newAmount), 
      acct: ACCT_META[acct].label
    });
    
    if(res.error) throw new Error(res.error);

    // 成功後，原地直接更新大倉庫 db 的內容，ID 完全不需要變更！
    [db[acct], currentAddedEntries[acct]].forEach(list => {
      const target = list.find(e => e.id === id);
      if (target) {
        target.date = newDate;
        target.subj = newSubj;
        target.note = newNote;
        target.amount = newAmount;
      }
    });

    // 重新排序並整理畫面
    sortEntries(db[acct]);
    renderAcct(acct);
    setStatus('ok', '資料修改成功！');
  } catch(e) {
    alert('修改失敗：' + e.message);
    setStatus('err', '修改失敗');
    renderAcct(acct);
  }
}

function getMonths(acct){
  const s=new Set();
  db[acct].forEach(e=>{ const m=(e.date||'').slice(0,6); if(m) s.add(m); });
  return Array.from(s).sort();
}
function updateFilter(acct){
  const sel=document.getElementById(acct+'-filter');
  if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="">全部月份</option>';
  getMonths(acct).forEach(m=>{
    const o=document.createElement('option');
    o.value=m; o.textContent=m; if(m===cur) o.selected=true;
    sel.appendChild(o);
  });
}
function renderAcct(acct){
  updateFilter(acct);
  
  // 計算上方四大統計卡片 (維持 db[acct] 大倉庫，確保結存金額 100% 正確)
  const entries=db[acct];
  let running=0;
  entries.forEach(e=>{
    if(e.type==='prev') running=e.amount;
    else if(e.type==='income') running+=e.amount;
    else running-=e.amount;
  });
  const prevBal=entries.filter(e=>e.type==='prev').reduce((s,e)=>s+e.amount,0);
  const totalIn=entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalOut=entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

    <div class="sum-card"><div class="sum-label"><i class="ti ti-trending-up"></i>本期收入</div><div class="sum-value g">${fmtMoney(totalIn)}</div></div>
    <div class="sum-card"><div class="sum-label"><i class="ti ti-trending-down"></i>本期支出</div><div class="sum-value r">${fmtMoney(totalOut)}</div></div>
    <div class="sum-card hl"><div class="sum-label"><i class="ti ti-wallet"></i>本期結存</div><div class="sum-value">${fmtMoney(running)}</div></div>`;

  // 下方明細表格「只渲染剛剛新增的項目」
  const displayRows = currentAddedEntries[acct] || [];

  if(displayRows.length===0){
    tbody.innerHTML=`<tr><td colspan="6"><div class="empty-state"><i class="ti ti-inbox"></i><p>當前尚無新增資料，請於上方填寫明細</p></div></td></tr>`;
    return;
  }
  
  const role = sessionStorage.getItem('beiji_user_role') || window.userRole || '一般';

  tbody.innerHTML=displayRows.map(r=>{
    const isPrev=r.type==='prev', isIn=r.type==='income';

    const exp=(!isPrev&&!isIn)?`<span class="no">${fmtMoney(r.amount)}</span>`:'<span class="mu">—</span>';
    
    let actionButtons = '';
    if (role === '管理員') {
      actionButtons = `<button class="btn primary" style="padding:4px 8px;font-size:12px;margin-right:4px;" onclick="editRowInline('${acct}','${r.id}',this)"><i class="ti ti-edit"></i> 編輯</button><button style="padding:4px 8px;font-size:12px;background:#C0392B;color:#fff;border:1px solid #C0392B;border-radius:4px;cursor:pointer;" onclick="removeEntry('${acct}','${r.id}')"><i class="ti ti-trash"></i> 刪除</button>`;
    } else if (role === '會計') {
      actionButtons = `<button class="btn primary" style="padding:4px 8px;font-size:12px;" onclick="editRowInline('${acct}','${r.id}',this)"><i class="ti ti-edit"></i> 編輯</button>`;
    } else {

    // 💡 調整表格 TD 結構，將原本最後一格的多餘資訊移除

        <div class="rrow"><span class="rl">台企定期(B)</span><span class="rv">${fmtMoney(B)}</span></div>
        <div class="rrow"><span class="rl">農會定期(C)</span><span class="rv">${fmtMoney(C)}</span></div>
        <div class="rrow"><span class="rl">金龜現金(D)</span><span class="rv">${fmtMoney(D)}</span></div>
        <div class="rrow"><span class="rl">信徒借款(E)</span><span class="rv">${fmtMoney(E)}</span></div>
      </div>`;

  const stats = {}; RA.forEach(a => { stats[a] = monthStats(a); });
  const allMonths = [...new Set(RA.flatMap(a => Object.keys(stats[a])))].filter(Boolean).sort().reverse();

  html += allMonths.map(m => {
    const ns = stats.nonghu[m] || { in: 0, out: 0 };

    const ls = stats.lingyon[m] || { in: 0, out: 0 };
    return `

      </div>`;
  }).join('') + `</div>`;

  document.getElementById('report-content').innerHTML = html;
}

function monthStats(acct) {
  const ms = {};
  db[acct].forEach(e => {
    const m = (e.date || '').slice(0, 6);
    if (!m) return;
    if (!ms[m]) ms[m] = { in: 0, out: 0 };
    if (e.type === 'income') ms[m].in += e.amount;
    else if (e.type === 'expense') ms[m].out += e.amount;
  });
  return ms;
}

// ── Query ─────────────────────────────────────────────────
// ─── 修正後的查詢函式：預設自動鎖定當月資料 ───
function runQuery(){
  let dateFromEl = document.getElementById('q-date-from');
  let dateToEl = document.getElementById('q-date-to');
  
  if (dateFromEl && dateToEl && !dateFromEl.value && !dateToEl.value) {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0'); 
    const today = String(now.getDate()).padStart(2, '0');      
    
    dateFromEl.value = `${year}-${month}-01`;
    dateToEl.value = `${year}-${month}-${today}`;
  }

  const acctFilter = document.getElementById('q-acct').value;
  const typeFilter = document.getElementById('q-type').value;
  
  // 統一將前端日期欄位清洗成標準橫線格式
  const dateFrom = dateFromEl.value.trim().replace(/[\/\.]/g, '-');
  const dateTo   = dateToEl.value.trim().replace(/[\/\.]/g, '-');
  const keyword  = document.getElementById('q-keyword').value.trim().toLowerCase();
  
  let results = [];
  if (typeof ACCT_KEYS !== 'undefined' && typeof db !== 'undefined') {
    ACCT_KEYS.forEach(acct => {
      if (!db[acct]) return; 
      db[acct].forEach(e => {
        const acctLabel = ACCT_META[acct].label;
        if (acctFilter && acctLabel !== acctFilter) return;
        if (typeFilter && TYPE_MAP[e.type] !== typeFilter) return;
        
        // 將斜線 / 和 點點 . 通通轉換成橫線 -
        let rawDate = String(e.date || '').trim().replace(/[\/\.]/g, '-');
        if (rawDate.includes('T')) {
          rawDate = rawDate.split('T')[0];
        } else {
          rawDate = rawDate.substring(0, 10);
        }
        
        let compareDate = rawDate; 
        
        // 完美兼容民國 115 年
        if (rawDate.startsWith('115-')) {
          compareDate = '2026' + rawDate.substring(3);
        }
        
        // 使用完全對齊的西元橫線時間軸進行過濾
        if (dateFrom && compareDate < dateFrom) return;
        if (dateTo && compareDate > dateTo) return;
        
        if (keyword) { 
          const h = ((e.subj || '') + (e.note || '')).toLowerCase(); 
          if (!h.includes(keyword)) return; 
        }
        
        // 💡 這裡把物件的 acct 英文代碼（如 lingyon）順便傳下去，等一下編輯按鈕需要用到
        results.push({ ...e, date: rawDate, acctLabel, acctKey: acct });
      });
    });
  }
  
  // 依日期排序
  results.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  
  const totalIn  = results.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const totalOut = results.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);

  // 產生篩選條件說明文字
  const dateFromDisp = document.getElementById('q-date-from').value;
  const dateToDisp   = document.getElementById('q-date-to').value;
  const keywordDisp  = document.getElementById('q-keyword').value.trim();
  const acctFilter2  = document.getElementById('q-acct').value;
  let filterDesc = '';
  if (dateFromDisp || dateToDisp) filterDesc += `${dateFromDisp||'?'} ～ ${dateToDisp||'?'}`;
  if (acctFilter2) filterDesc += (filterDesc ? '　' : '') + acctFilter2;
  if (keywordDisp) filterDesc += (filterDesc ? '　' : '') + `「${keywordDisp}」`;
  const labelSuffix = filterDesc ? `<span style="font-size:10px;color:var(--ink-soft);font-weight:400;display:block;margin-top:2px;">${filterDesc}</span>` : '';

  document.getElementById('query-count').textContent = `共 ${results.length} 筆`;
  const statsEl = document.getElementById('query-stats');
  if (statsEl) {
    if (results.length > 0) {
      statsEl.style.display = 'grid';
      statsEl.innerHTML = `
        <div class="sum-card"><div class="sum-label"><i class="ti ti-trending-up"></i>收入合計${labelSuffix}</div><div class="sum-value g">${fmtMoney(totalIn)}</div></div>
        <div class="sum-card"><div class="sum-label"><i class="ti ti-trending-down"></i>支出合計${labelSuffix}</div><div class="sum-value r">${fmtMoney(totalOut)}</div></div>
        <div class="sum-card hl"><div class="sum-label"><i class="ti ti-calculator"></i>收支差額${labelSuffix}</div><div class="sum-value">${fmtMoney(totalIn - totalOut)}</div></div>`;
    } else { 
      statsEl.style.display = 'none'; 
    }
  }
  
  const tbody = document.getElementById('query-tbody');
  if (tbody) {
    if (results.length === 0) { 
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="ti ti-search"></i><p>查無符合資料</p></div></td></tr>`; 
      return; 
    }
    
    // 💡 取得當前登入使用者的職稱權限
    const role = sessionStorage.getItem('beiji_user_role') || window.userRole || '一般';

    const typeTag = t => t === 'income' ? '<span class="tag in">收入</span>' : t === 'expense' ? '<span class="tag out">支出</span>' : '<span class="tag prev">結存</span>';
    
    tbody.innerHTML = results.map(r => {
      let actionButtons = '';
      if (role === '管理員') {
        actionButtons = `<button class="btn primary" style="padding:4px 8px;font-size:12px;margin-right:4px;" onclick="editRowInlineQuery('${r.acctKey}','${r.id}',this)"><i class="ti ti-edit"></i> 編輯</button><button style="padding:4px 8px;font-size:12px;background:#C0392B;color:#fff;border:1px solid #C0392B;border-radius:4px;cursor:pointer;" onclick="removeEntryFromQuery('${r.acctKey}','${r.id}')"><i class="ti ti-trash"></i> 刪除</button>`;
      } else if (role === '會計') {
        actionButtons = `<button class="btn primary" style="padding:4px 8px;font-size:12px;" onclick="editRowInlineQuery('${r.acctKey}','${r.id}',this)"><i class="ti ti-edit"></i> 編輯</button>`;
      } else {
        actionButtons = `<span class="mu">—</span>`;
      }

      // 💡 幫 <tr> 加上動態 ID (qrow-帳戶-明細ID)，並幫各個要編輯的欄位加上專屬 class
      return `
        <tr class="dr" id="qrow-${r.acctKey}-${r.id}">
          <td class="qcell-date" style="white-space:nowrap;">${r.date}</td>
          <td class="mu" style="white-space:nowrap;">${r.acctLabel}</td>
          <td class="qcell-subj" style="white-space:nowrap;">${r.subj || ''}</td>
          <td class="qcell-note mu" style="white-space:nowrap;">${r.note || '—'}</td>
          <td style="white-space:nowrap;">${typeTag(r.type)}</td>
          <td class="qcell-amount" style="text-align: right; white-space:nowrap;"><span class="${r.type === 'income' ? 'ni' : r.type === 'expense' ? 'no' : 'mu'}">${fmtMoney(r.amount)}</span></td>
          <td style="white-space: nowrap; text-align: center;">${actionButtons}</td>
        </tr>`;
    }).join('');
  }
}

function exportExcel(){
  const wb = XLSX.utils.book_new();
  const ACCT_LABELS = {nonghu:'農會儲簿',taiqiye:'台企儲簿',lingyon:'零用金（採購）',jijin:'基金會'};
  const RA = ['nonghu','taiqiye','lingyon'];
  const A = RA.reduce((s,a)=>s+getAcctBal(a),0);
  const fixed = getFixedLatest();
  const grand = A + Object.values(fixed).reduce((s,v)=>s+v,0);

  // 從資料推算期間
  let allDates=[];
  ACCT_KEYS.forEach(a=>{ db[a].forEach(e=>{ if(e.date) allDates.push(e.date); }); });
  allDates.sort();
  const periodStr = allDates.length
    ? (allDates[0].slice(0,7) + (allDates[0].slice(0,7)!==allDates[allDates.length-1].slice(0,7) ? ' ～ '+allDates[allDates.length-1].slice(0,7) : ''))
    : '';

  ACCT_KEYS.forEach(acct=>{
    const entries = db[acct];
    if(entries.length===0) return;
    const acctName = ACCT_LABELS[acct];
    const rows=[];
    const merges=[];
    let r=0;  // current row index

    // ══ 抬頭區 ══════════════════════════════════════════
    // R0: 主標題（合併 A:F）
    rows.push(['北極殿　帳務明細報表','','','','','']);
    merges.push({s:{r,c:0},e:{r,c:5}}); r++;

    // R1: 副標題
    rows.push([`帳戶：${acctName}`, '', `期間：${periodStr}`, '', '製表日：'+new Date().toLocaleDateString('zh-TW'), '']);
    merges.push({s:{r,c:0},e:{r,c:1}});
    merges.push({s:{r,c:2},e:{r,c:3}});
    merges.push({s:{r,c:4},e:{r,c:5}}); r++;

    // R2: 空行
    rows.push(['','','','','','']); r++;

    // R3: 欄標題
    rows.push(['日期','科目／商家','摘要','收入','支出','餘額']); r++;

    // ══ 明細區 ══════════════════════════════════════════
    const dataStartRow = r;
    let running=0;
    entries.forEach(e=>{
      let inc='', exp='';
      if(e.type==='prev'){ running=e.amount; inc=e.amount; }
      else if(e.type==='income'){ running+=e.amount; inc=e.amount; }
      else{ running-=e.amount; exp=e.amount; }
      rows.push([e.date, e.subj||'', e.note||'',
        inc===''?'':inc, exp===''?'':exp, running]);
      r++;
    });

    // ══ 合計列 ══════════════════════════════════════════
    const totalIn  = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const totalOut = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    rows.push(['','','合計',totalIn,totalOut,running]); r++;
    rows.push(['','','','','','']); r++;  // 空行

    // ══ 定存 / 特殊科目（僅三個主帳戶）══════════════════
    if(RA.includes(acct)){
      const noteMap={};
      db.fixed.forEach(f=>{ if(!noteMap[f.key]) noteMap[f.key]=''; noteMap[f.key]+=(noteMap[f.key]?'、':'')+f.note; });
      [['B','台企定期（B）'],['C','農會定期（C）'],['D','金龜現金（D）'],['E','信徒借款（E）']].forEach(([k,lbl])=>{
        rows.push([lbl, noteMap[k]||'', '', fixed[k], '', '']);
        merges.push({s:{r,c:0},e:{r,c:0}});
        r++;
      });
      rows.push(['','','','','','']); r++;
      rows.push([`A＋B＋C＋D＋E＝ ${grand.toLocaleString('zh-TW')}`, '','','','','']);
      merges.push({s:{r,c:0},e:{r,c:5}}); r++;
      rows.push(['','','','','','']); r++;
    }

    // ══ 簽名欄 ══════════════════════════════════════════
    rows.push(['','','','','','']); r++;
    // 簽名標題行
    rows.push(['主　委', '', '監　委', '', '出　納', '會　計']);
    merges.push({s:{r,c:0},e:{r,c:1}});
    merges.push({s:{r,c:2},e:{r,c:3}});
    r++;
    // 簽名線行（用底線字元模擬）
    rows.push(['_______________', '', '_______________', '', '_______________', '_______________']);
    merges.push({s:{r,c:0},e:{r,c:1}});
    merges.push({s:{r,c:2},e:{r,c:3}});
    r++;
    rows.push(['','','','','','']); r++;
    // 蓋章說明
    rows.push(['※本報表經主委、監委、出納、會計簽章後生效','','','','','']);
    merges.push({s:{r,c:0},e:{r,c:5}}); r++;

    // ══ 建立工作表 ══════════════════════════════════════
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;
    ws['!cols'] = [{wch:14},{wch:20},{wch:24},{wch:13},{wch:13},{wch:14}];

    // 列高：標題列較高
    ws['!rows'] = [];
    ws['!rows'][0] = {hpt:28};  // 主標題
    ws['!rows'][1] = {hpt:18};  // 副標題
    ws['!rows'][3] = {hpt:16};  // 欄標題

    XLSX.utils.book_append_sheet(wb, ws, acctName);
  });

  if(wb.SheetNames.length===0){ alert('沒有資料可匯出'); return; }
  XLSX.writeFile(wb,'九肉北極殿帳務_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

  // ─── 新增：權限功能、介面遮蔽與快取記住登入狀態 ─────────────────────────

async function gsReq(params) {
  // 這裡會自動讀取您原本宣告在最頂端的 GS_URL 變數
  if (!GS_URL) {
    throw new Error('未設定 GS_URL 變數，請檢查網頁頂端設定');
  }
  
  // 將物件參數動態轉換為網址後的網址字串 (Query String)
  const url = GS_URL + '?' + new URLSearchParams(params).toString();
  
  // 發送非同步請求給 Google Apps Script 後端
  const response = await fetch(url, {
    method: 'GET'
  });
  
  if (!response.ok) {
    throw new Error('網路回應錯誤，無法連線至後端');
  }
  
  // 解析後端傳回的 JSON 資料
  return await response.json();
}
async function submitLogin() {
  const user = document.getElementById('login-user').value;
  const pwd = document.getElementById('login-pwd').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');

  if (!user || !pwd) {
    err.innerText = "請輸入帳號與密碼";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2 animate-spin"></i> 驗證中...';
  err.innerText = "";

  try {
    // 呼叫後端 GAS
    const res = await gsReq({ action: 'login', username: user, password: pwd });

    if (res.success) {
      // 1. 驗證成功，移除登入遮罩，讓後方主畫面露出來
      document.getElementById('login-overlay').style.display = 'none';
      
      // 2. 【大補帖】把所有可能用到的權限儲存方式一次塞滿，讓原本系統絕對讀得到！
      window.userRole = res.role;                                // 記憶體儲存
      sessionStorage.setItem('beiji_user_role', res.role);       // 新版網頁儲存
      sessionStorage.setItem('userRole', res.role);             // 舊版網頁儲存
      
      console.log("登入成功，角色為:", res.role);

      // 3. 強制通知系統「立刻重新檢查並套用權限」
      if (typeof applyRolePermissions === 'function') {
        applyRolePermissions();
      }
      
      // 4. 如果系統有需要重新載入或初始化的動作，就在這裡順便執行
      if (typeof initializeSystem === 'function') {
        initializeSystem();
      }
    } else {
      err.innerText = res.message || "帳號或密碼錯誤";
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> 安全登入';
    }
  } catch (e) {
    console.error(e);
    err.innerText = "連線異常，請確認 GAS 是否已發布";
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> 安全登入';
  }
}

// ─── 修改後的權限套用函式 ─────────────────────────────────────
function applyRolePermissions() {
  const role = sessionStorage.getItem('beiji_user_role') || window.userRole || '一般';
  console.log("正在套用權限，當前角色為:", role);
  
  const allTabs = document.querySelectorAll('.tabs-bar .tab-btn');
  allTabs.forEach(btn => btn.style.display = ''); // 先全部還原

  if (role === '一般') {
    // 訪客：只開放查詢分頁，隱藏其他所有分頁與新增表單
    allTabs.forEach(btn => {
      const tab = btn.getAttribute('data-tab') || '';
      if (tab !== 'query') btn.style.display = 'none';
    });
    injectTemplateStyles('.panel-body, .panel-hdr .btn { display: none !important; }');

  } else if (role === '會計') {
    // 會計：可進所有分頁、可編輯，但不能刪除
    injectTemplateStyles('');

  } else if (role === '管理員') {
    // 管理員：全功能開放
    injectTemplateStyles('');
  }
}

// 輔助函式：確保樣式注入不會蓋掉主畫面
function injectTemplateStyles(cssText) {
  let styleEl = document.getElementById('role-style-override');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'role-style-override';
    document.head.appendChild(styleEl);
  }
  styleEl.innerHTML = cssText;
}

// ─── 修正後的系統初始化函式 (強迫等待雲端同步完成，再開放查詢) ───
async function initializeSystem() {
  // 1. 先確認並套用最高權限
  applyRolePermissions(); 

  // 2. 載入定存快取 (如果原本系統有這個函式)
  if (typeof loadFixed === 'function') loadFixed(); 
  
  // 3. 【核心修正】同步雲端帳簿明細 + 科目清單（並行執行加快速度）
  if (typeof loadFromGS === 'function') {
    setStatus('loading', '雲端資料同步中...');
    
    // 科目清單與帳務資料並行載入
    const [success] = await Promise.all([
      loadFromGS(),
      loadSubjects(),
    ]);
    
    if (success) {
      setStatus('ok', '同步完成');
      switchTab('query');
      if (typeof runQuery === 'function') {
        console.log("雲端資料下載完畢，開始預設查詢...");
        runQuery();
      }
    } else {
      setStatus('err', '雲端同步失敗');
      alert('同步雲端資料失敗，請確認網路或重新整理網頁。');
    }
  }
}

// ─── 修改：具有權限檢查功能的 Tab 切換 ─────────────────────────
function switchTab(name) {
  const role = sessionStorage.getItem('beiji_user_role') || '一般';
  if (role === '一般' && name !== 'query' && name !== 'report') {
    alert('您的權限層級無法存取記帳功能。');
    return;
  }
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  const targetPane = document.getElementById('tab-' + name);
  const targetBtn = document.querySelector(`[data-tab="${name}"]`);
  if (targetPane) targetPane.style.display = '';
  if (targetBtn) targetBtn.classList.add('active');
  
  if (name === 'report') renderReport();
  else if (ACCT_KEYS.includes(name)) renderAcct(name);
  else if (name === 'fixed') renderFixed();
}

function editRowInlineQuery(acctKey, id, btn) {
  const tr = document.getElementById(`qrow-${acctKey}-${id}`);
  if (!tr || tr.classList.contains('is-editing')) return;
  
  tr.classList.add('is-editing');
  
  // 從 db 全域大倉庫撈出歷史原始資料
  const item = db[acctKey].find(e => e.id === id);
  if (!item) return;

  const dateTd = tr.querySelector('.qcell-date');
  const subjTd = tr.querySelector('.qcell-subj');
  const noteTd = tr.querySelector('.qcell-note');
  const amountTd = tr.querySelector('.qcell-amount');
  const actionTd = btn.parentElement;

  // 歷史資料所有欄位解鎖變輸入框
  dateTd.innerHTML = `<input type="text" class="qedit-input-date" value="${item.date}" style="width:85px; padding:2px;">`;
  subjTd.innerHTML = `<input type="text" class="qedit-input-subj" value="${item.subj}" style="width:100px; padding:2px;">`;
  noteTd.innerHTML = `<input type="text" class="qedit-input-note" value="${item.note}" style="width:120px; padding:2px;">`;
  amountTd.innerHTML = `<input type="number" class="qedit-input-amount" value="${item.amount}" inputmode="numeric" pattern="[0-9]*" style="width:80px; padding:2px; text-align:right;">`;

  actionTd.innerHTML = `
    <button class="btn success" style="padding:4px 8px; font-size:12px; background-color:#28a745; color:white; margin-right:4px;" onclick="saveRowInlineQuery('${acctKey}','${id}',this)"><i class="ti ti-check"></i> 儲存</button>
    <button class="btn" style="padding:4px 8px; font-size:12px; background-color:#6c757d; color:white;" onclick="if(typeof runQuery === 'function') runQuery();"><i class="ti ti-x"></i> 取消</button>
  `;
}

// ─── 💡【全新追加：查詢分頁同步雲端儲存】 ───
async function saveRowInlineQuery(acctKey, id, btn) {
  const tr = document.getElementById(`qrow-${acctKey}-${id}`);
  if (!tr) return;

  const newDate = tr.querySelector('.qedit-input-date').value.trim();
  const newSubj = tr.querySelector('.qedit-input-subj').value.trim();
  const newNote = tr.querySelector('.qedit-input-note').value.trim();
  const newAmount = parseFloat(tr.querySelector('.qedit-input-amount').value);

  if(!newDate || !newSubj) { alert('日期與科目不能留空！'); return; }
  if(isNaN(newAmount) || newAmount < 0) { alert('請輸入正確的金額！'); return; }

  btn.disabled = true; btn.innerHTML = '…';
  setStatus('loading', '雲端歷史資料修改中...');

  try {
    const oldItem = db[acctKey].find(e => e.id === id);
    if (!oldItem) throw new Error("找不到原始資料");

    // 直接發送 edit 指令給我們最新的後端 GAS，原地修改
    const res = await gsReq({
      action: 'edit', 
      id: String(id),
      date: newDate, 
      subj: newSubj, 
      note: newNote || '', 
      type: TYPE_MAP[oldItem.type] || oldItem.type, 
      amount: String(newAmount), 
      acct: ACCT_META[acctKey].label
    });
    
    if(res.error) throw new Error(res.error);

    // 成功後，更新前端 db 大資料庫中的歷史資料
    if (oldItem) {
      oldItem.date = newDate;
      oldItem.subj = newSubj;
      oldItem.note = newNote;
      oldItem.amount = newAmount;
    }
    
    // 重新排序大倉庫
    sortEntries(db[acctKey]);

    // 💡 關鍵：重新觸發一次查詢，讓畫面上的表格和統計數字即時刷新！
    if (typeof runQuery === 'function') runQuery();
    
    setStatus('ok', '歷史資料修改成功！');
  } catch(e) {
    alert('歷史修改失敗：' + e.message);
    setStatus('err', '修改失敗');
    if (typeof runQuery === 'function') runQuery();
  }
}
  
// ─── 查詢分頁專用刪除函式（管理員專屬）────────────────────────────────
async function removeEntryFromQuery(acctKey, id) {
  if (!confirm('確定要刪除這筆資料？此動作無法復原。')) return;
  setStatus('loading', '刪除中…');
  try {
    const res = await gsReq({ action: 'delete', id: String(id) });
    if (res.error) throw new Error(res.error);
    db[acctKey] = db[acctKey].filter(e => e.id !== id);
    if (currentAddedEntries[acctKey]) {
      currentAddedEntries[acctKey] = currentAddedEntries[acctKey].filter(e => e.id !== id);
    }
    setStatus('ok', '已刪除');
    if (typeof runQuery === 'function') runQuery();
  } catch(e) {
    alert('刪除失敗：' + e.message);
    setStatus('err', '刪除失敗');
  }
}

// ─── 修正：網頁初始化守衛 (解決網頁重新整理資料遺失的問題) ──────────────
window.onload = async function() {
  const isAuthed = sessionStorage.getItem('beiji_logged_in');
  if (isAuthed === 'true') {
    document.getElementById('login-overlay').style.display = 'none';
    await initializeSystem();
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('login-user').focus();
  }
};
