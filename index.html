<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北極殿帳務管理系統</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    /* ─── 1. 權限登入全螢幕遮罩樣式 ─── */
    .login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1A1209; display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 1rem; box-sizing: border-box;
    }
    .login-box {
      background: #FBF6EC; border: 2px solid #B8972A; border-radius: 6px;
      padding: 2.5rem 2rem; width: 100%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center; box-sizing: border-box;
    }
    .login-title {
      font-size: 22px; font-weight: 700; color: #3D2E0F;
      margin-bottom: 5px; letter-spacing: 0.1em;
    }
    .login-subtitle {
      font-size: 13px; color: #7A621C; margin-bottom: 2rem;
    }
    .login-box .fg { margin-bottom: 0.8rem; text-align: left; }
    .login-box label { display: block; font-size: 13px; color: #3D2E0F; margin-bottom: 4px; font-weight: 600; }
    .login-box input { 
      width: 100%; height: 38px; text-align: center; font-size: 15px; 
      border: 1px solid #7A621C; border-radius: 4px; background: #fff; box-sizing: border-box;
    }
    .login-btn { 
      width: 100%; height: 42px; font-size: 15px; margin-top: 0.5rem; 
      background: #B8972A; color: #fff; border: none; border-radius: 4px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600;
    }
    .login-btn:hover { background: #7A621C; }
    .login-err { color: #C0392B; font-size: 13px; margin-top: 0.8rem; min-height: 18px; font-weight: 500; }

    /* ─── 2. 您原本系統的完整主樣式 (已幫您將打碎的樣式整理回這裡) ─── */
    *, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { 
      --gold: #B8972A; --gold-light: #F0D980; --gold-dim: #7A621C; 
      --ink: #1A1209; --ink-mid: #3D2E0F; --ink-soft: #7A6440; 
      --paper: #FBF6EC; --paper-mid: #F2E8D0; --paper-dark: #E4D5B0; 
      --bg: #EDE3CC; --green: #1A6B3C; --green-light: #EBF5EE; 
      --blue: #1A3A6B; --blue-light: #EBEFF5; --red: #C0392B; --red-light: #FDEBE8; 
      --shadow: 0 2px 12px rgba(60,60,10,0.12); --radius: 6px; 
      --serif: 'Noto Serif TC', serif; --sans: 'Noto Sans TC', sans-serif; 
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* ─── 補回遺失的網頁主體排版與核心 CSS ─── */
*, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; }

:root { 
  --gold: #B8972A; --gold-light: #F0D980; --gold-dim: #7A621C; 
  --ink: #1A1209; --ink-mid: #3D2E0F; --ink-soft: #7A6440; 
  --paper: #FBF6EC; --paper-mid: #F2E8D0; --paper-dark: #E4D5B0; 
  --bg: #EDE3CC; --green: #1A6B3C; --green-light: #EBF5EE; 
  --blue: #1A3A6B; --blue-light: #EBEFF5; --red: #C0392B; --red-light: #FDEBE8; 
  --shadow: 0 2px 12px rgba(60,60,10,0.12); --radius: 6px; 
  --serif: 'Noto Serif TC', serif; --sans: 'Noto Sans TC', sans-serif; 
}

body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; padding: 0; margin: 0; }

/* 頂部標題列 */
.site-header { 
  background: var(--ink); padding: 0 2rem; display: flex; align-items: center; 
  justify-content: space-between; height: 58px; border-bottom: 2px solid var(--gold); 
}
.site-logo { font-family: var(--serif); font-size: 19px; font-weight: 700; color: var(--gold-light); letter-spacing: .1em; display: flex; align-items: center; gap: 10px; }
.sync-status { font-size: 12px; display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(240,217,128,.3); color: rgba(240,217,128,.7); white-space: nowrap; }

/* 導覽功能分頁列 */
.tabs-bar { background: var(--ink-mid); display: flex; align-items: center; gap: 2px; padding: 0 2rem; overflow-x: auto; border-bottom: 2px solid transparent; transition: all .15s; }
.tab-btn { background: transparent; border: none; color: rgba(240,217,128,.55); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all .15s; padding: 10px 16px; font-size: 13px; font-family: var(--sans); font-weight: 500; }
.tab-btn:hover { color: var(--gold-light); }
.tab-btn.active { color: var(--gold-light); border-bottom-color: var(--gold); font-weight: 700; }

/* 主要內容區域 */
main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.sum-card { background: var(--paper); border: 1px solid var(--paper-dark); border-radius: var(--radius); padding: 1rem 1.25rem; box-shadow: var(--shadow); }
.sum-label { font-size: 11px; color: var(--ink-soft); display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.sum-value { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--ink); }

/* 按鈕基本樣式 */
.btn { font-size: 13px; height: 31px; border-radius: var(--radius); border: 1px solid var(--paper-dark); background: var(--paper); color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; padding: 0 13px; font-family: var(--sans); transition: all .15s; white-space: nowrap; text-decoration: none; }
.btn:hover { background: var(--paper-mid); }
.btn.primary { background: var(--gold); color: #fff; border-color: var(--gold); font-weight: 600; }
.btn.primary:hover { background: var(--ink); }

 /* ─── 補回遺失的查詢區域與表格專用 CSS ─── */

/* 查詢表單格線排版 */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  background: var(--paper);
  border: 1px solid var(--paper-dark);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 1.5rem;
  align-items: flex-end; /* 讓按鈕與輸入框底部對齊 */
}

/* 表單內部的輸入欄位群組 */
.fg {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.fg label {
  font-size: 12px;
  color: var(--ink-soft);
  font-weight: 600;
}

/* 輸入框、下拉選單的基本樣式優化 */
.fg input, .fg select, .search-bar input {
  height: 34px;
  padding: 0 10px;
  border: 1px solid var(--paper-dark);
  border-radius: var(--radius);
  background: #fff;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  width: 100%;
  box-sizing: border-box;
  transition: border-color .15s, box-shadow .15s;
}

.fg input:focus, .fg select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184,151,42,.15);
}

/* 關鍵字搜尋列專用 */
.search-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 0.5rem;
}

/* 查詢結果與表格外框 */
.panel-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  color: var(--gold-dim);
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.table-wrap {
  overflow-x: auto;
  background: var(--paper);
  border: 1px solid var(--paper-dark);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-top: 0.5rem;
}

/* 表格本體 */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  text-align: left;
}

th {
  background: var(--paper-mid);
  color: var(--ink-mid);
  font-weight: 700;
  padding: 10px 12px;
  border-bottom: 2px solid var(--paper-dark);
  white-space: nowrap;
}

td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--paper-mid);
  color: var(--ink);
  vertical-align: middle;
}

tr:last-child td {
  border-bottom: none;
}

tr:hover td {
  background: var(--paper-light);
}

/* 查無資料的提示樣式 */
.empty-state {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--ink-soft);
  font-size: 13px;
}   
  </style>
</head>

<body>
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <div style="font-size: 40px; color: var(--gold); margin-bottom: 10px;"><i class="ti ti-lock-square-rounded"></i></div>

<nav class="tabs-bar">

const GS_URL = 'https://script.google.com/macros/s/AKfycbySigAnxTsR4Wsn8Bh2-ZGkFeAJrMFGewsgzc1-jmwonSJVJDY_OgEoMJsoOJNH_hY/exec';

if (typeof syncDate !== 'function') {
  function syncDate(arg1, arg2) {
    // 讓它安全空轉，不干擾原本的邏輯，或者是直接回傳傳進來的東西
    return arg1; 
  }
}
async function gsReq(params){
  // Apps Script Web App 用 GET + query string，避免 POST redirect 問題
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(GS_URL + '?' + qs, {
    method: 'GET',
    redirect: 'follow'
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { throw new Error('回應格式錯誤: ' + text.slice(0,100)); }
}

// ── 民國日期工具（使用原生日曆） ─────────────────────────
// 西元 → 民國：yyyy.mm.dd
function adToRoc(adStr){
  if(!adStr) return '';
  const [y,m,d] = adStr.split('-');
  return `${parseInt(y)-1911}.${m}.${d}`;
}
// 民國 → 西元（給 input[type=date] 使用）
function rocToAd(rocStr){
  if(!rocStr) return '';
  const parts = rocStr.split('.');
  if(parts.length<3) return '';
  const y = String(parseInt(parts[0])+1911);
  return `${y}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
}
function buildRocDatePicker(idPrefix){
  const today = new Date().toISOString().slice(0,10);
  return `<div style="position:relative;display:inline-block;">

      style="height:34px;padding:0 9px;border:1px solid var(--paper-dark);border-radius:var(--radius);
             background:var(--paper);color:var(--ink);font-size:13px;font-family:var(--sans);
             outline:none;width:160px;cursor:pointer;"
      onfocus="this.style.borderColor='var(--gold)';this.style.boxShadow='0 0 0 3px rgba(184,151,42,.15)'"
      onblur="this.style.borderColor='var(--paper-dark)';this.style.boxShadow='none'"
    />
  </div>`;
}
function getDateVal(pfx){
  const native = document.getElementById(pfx+'-date-native');
  if(!native||!native.value) return '';
  return adToRoc(native.value);
}

}

// ── Status ────────────────────────────────────────────────
function setStatus(state, msg){
  const el=document.getElementById('sync-status');
  el.className='sync-status '+state;
  el.innerHTML=`<i class="ti ti-cloud${state==='loading'?' spin':''}"></i>${msg}`;

// ── Load from Google Sheets ──────────────────────────────
async function loadFromGS(){
  setStatus('loading','連線 Google Sheets…');
  try {
    const res = await gsReq({action:'getAll'});
    if(res.error) throw new Error(res.error);
    db={nonghu:[],taiqiye:[],lingyon:[],jijin:[],fixed:db.fixed};
    (res.rows||[]).forEach(row=>{
      const key=LABEL_TO_KEY[row.acct];
      if(!key||!db[key]) return;
      db[key].push({
        id: String(row.id),
        date: row.date||'',
        subj: row.subj||'',
        note: row.note||'',
        type: TYPE_MAP_R[row.type]||row.type||'income',
        amount: parseFloat(row.amount)||0,
        acct: row.acct||''
      });
    });
    ACCT_KEYS.forEach(a=>sortEntries(db[a]));
    setStatus('ok','✓ 已同步');
    return true;
  } catch(err){
    console.warn('Google Sheets 連線失敗:', err.message);
    setStatus('err','同步失敗－請重試');
    return false;
  }
}

// ── CRUD ──────────────────────────────────────────────────
function sortEntries(arr){
  arr.sort((a,b)=>{
    if(a.type==='prev'&&b.type!=='prev') return -1;
    if(b.type==='prev'&&a.type!=='prev') return 1;
    return (a.date||'').localeCompare(b.date||'');
  });
}
function fmtMoney(n){
  if(n===null||n===undefined||n==='') return '—';
  return '$'+Math.round(n).toLocaleString('zh-TW');
}

async function addEntry(acct){
  const date   = getDateVal(acct);
  const subj   = document.getElementById(acct+'-subj').value.trim();
  const note   = document.getElementById(acct+'-note').value.trim();
  const type   = document.getElementById(acct+'-type').value;
  const amount = parseFloat(document.getElementById(acct+'-amount').value);
  if(!date||!subj||isNaN(amount)||amount<0){ alert('請填寫科目／商家與金額'); return; }
  const btn=document.getElementById(acct+'-add-btn');
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader spin"></i>儲存中…';
  try {
    const entry={date,subj,note,type,amount};
    const res=await gsReq({action:'add', date, subj, note:note||'', type:TYPE_MAP[type]||type, amount:String(amount), acct:ACCT_META[acct].label});
    if(res.error) throw new Error(res.error);
    entry.id=String(res.id);
    db[acct].push(entry);
    sortEntries(db[acct]);
    renderAcct(acct);
    document.getElementById(acct+'-subj').value='';
    document.getElementById(acct+'-note').value='';
    document.getElementById(acct+'-amount').value='';
    setStatus('ok','已儲存');
  } catch(e){ alert('儲存失敗：'+e.message); setStatus('err','儲存失敗'); }
  btn.disabled=false; btn.innerHTML='<i class="ti ti-plus"></i>新增';
}

async function removeEntry(acct,id){
  if(!confirm('確定刪除這筆資料？')) return;
  try {
    const res=await gsReq({action:'delete', id:String(id)});
    if(res.error) throw new Error(res.error);
    db[acct]=db[acct].filter(e=>e.id!==id);
    renderAcct(acct);
    setStatus('ok','已刪除');
  } catch(e){ alert('刪除失敗：'+e.message); }
}

// ── Fixed (localStorage) ──────────────────────────────────
function addFixed(){
  const month=document.getElementById('fx-month').value.trim();
  const key=document.getElementById('fx-key').value;
  const amount=parseFloat(document.getElementById('fx-amount').value);
  const note=document.getElementById('fx-note').value.trim();
  if(!month||isNaN(amount)){ alert('請填寫年月與金額'); return; }
  db.fixed.push({id:Date.now(),month,key,amount,note});
  db.fixed.sort((a,b)=>a.month.localeCompare(b.month)||a.key.localeCompare(b.key));
  saveFixed(); renderFixed();
  document.getElementById('fx-amount').value='';
  document.getElementById('fx-note').value='';
}
function removeFixed(id){ if(!confirm('確定刪除？')) return; db.fixed=db.fixed.filter(e=>e.id!==id); saveFixed(); renderFixed(); }
function saveFixed(){ try{ localStorage.setItem('beiji_fixed',JSON.stringify(db.fixed)); }catch(e){} }
function loadFixed(){ try{ const s=localStorage.getItem('beiji_fixed'); if(s) db.fixed=JSON.parse(s); }catch(e){} }

// ── Tabs ──────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tab-pane').forEach(p=>p.style.display='none');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).style.display='';
  document.querySelector('[data-tab="'+name+'"]').classList.add('active');
  if(name==='report') renderReport();
  else if(ACCT_KEYS.includes(name)) renderAcct(name);
  else if(name==='fixed') renderFixed();
}

// ── Render Account ────────────────────────────────────────
function getMonths(acct){
  const s=new Set();
  db[acct].forEach(e=>{ const m=(e.date||'').slice(0,6); if(m) s.add(m); });
  return Array.from(s).sort();
}
function updateFilter(acct){
  const sel=document.getElementById(acct+'-filter');
  if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="">全部月份</option>';
  getMonths(acct).forEach(m=>{
    const o=document.createElement('option');
    o.value=m; o.textContent=m; if(m===cur) o.selected=true;
    sel.appendChild(o);
  });
}
function renderAcct(acct){
  updateFilter(acct);
  const fm=document.getElementById(acct+'-filter').value;
  const entries=db[acct];
  let running=0;
  const allRows=entries.map(e=>{
    if(e.type==='prev') running=e.amount;
    else if(e.type==='income') running+=e.amount;
    else running-=e.amount;
    return {...e,running};
  });
  const prevBal=entries.filter(e=>e.type==='prev').reduce((s,e)=>s+e.amount,0);
  const totalIn=entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const totalOut=entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById(acct+'-stats').innerHTML=`
    <div class="sum-card"><div class="sum-label"><i class="ti ti-arrow-bar-to-up"></i>上期結存</div><div class="sum-value b">${fmtMoney(prevBal)}</div></div>
    <div class="sum-card"><div class="sum-label"><i class="ti ti-trending-up"></i>本期收入</div><div class="sum-value g">${fmtMoney(totalIn)}</div></div>
    <div class="sum-card"><div class="sum-label"><i class="ti ti-trending-down"></i>本期支出</div><div class="sum-value r">${fmtMoney(totalOut)}</div></div>
    <div class="sum-card hl"><div class="sum-label"><i class="ti ti-wallet"></i>本期結存</div><div class="sum-value">${fmtMoney(running)}</div></div>`;
  const displayRows=fm?allRows.filter(r=>(r.date||'').startsWith(fm)):allRows;
  const tbody=document.getElementById(acct+'-tbody');
  if(displayRows.length===0){
    tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><i class="ti ti-inbox"></i><p>尚無資料，請新增明細</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML=displayRows.map(r=>{
    const isPrev=r.type==='prev', isIn=r.type==='income';
    const inc=isPrev?`<span class="mu" style="font-size:12px">結存</span>`:isIn?`<span class="ni">${fmtMoney(r.amount)}</span>`:'<span class="mu">—</span>';
    const exp=(!isPrev&&!isIn)?`<span class="no">${fmtMoney(r.amount)}</span>`:'<span class="mu">—</span>';
    return `<tr class="${isPrev?'pr':'dr'}">
      <td>${r.date}</td>
      <td>${r.subj||''}</td>
      <td class="mu">${r.note||'—'}</td>
      <td>${inc}</td><td>${exp}</td>
      <td><span class="${r.running>=0?'np':'nn'}">${fmtMoney(r.running)}</span></td>
      <td><button class="btn danger" onclick="removeEntry('${acct}','${r.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('');
}

  db.fixed.forEach(f=>{ latest[f.key]=f.amount; });

// ── Report ────────────────────────────────────────────────
function getAcctBal(acct){
  let r=0;
  db[acct].forEach(e=>{ if(e.type==='prev') r=e.amount; else if(e.type==='income') r+=e.amount; else r-=e.amount; });
  return r;
}
function getFixedLatest(){
  const l={B:0,C:0,D:0,E:0};
  db.fixed.forEach(f=>{ l[f.key]=f.amount; });
  return l;
}
// ── 補全 Report 渲染邏輯 ────────────────────────────────
// ─── 補全並優化月報總表 (覆蓋原本被截斷的地方) ─────────────────────────
function renderReport() {
  const RA = ['nonghu', 'taiqiye', 'lingyon'];
  const bals = {}; RA.forEach(a => { bals[a] = getAcctBal(a); });
  const A = Object.values(bals).reduce((s, v) => s + v, 0);
  const fixed = getFixedLatest(); 
  const { B, C, D, E } = fixed; 
  const grand = A + B + C + D + E;

  let html = `
    <div class="summary-row">
      <div class="sum-card hl"><div class="sum-label">總資產 (A+B+C+D+E)</div><div class="sum-value" style="font-size:22px">${fmtMoney(grand)}</div></div>
      <div class="sum-card"><div class="sum-label">流動現金 (A)</div><div class="sum-value b">${fmtMoney(A)}</div></div>
    </div>
    <div class="report-grid">
      <div class="rcard">
        <div class="rcard-title">資產分佈明細</div>
        <div class="rrow"><span class="rl">農會儲簿</span><span class="rv">${fmtMoney(bals.nonghu)}</span></div>
        <div class="rrow"><span class="rl">台企儲簿</span><span class="rv">${fmtMoney(bals.taiqiye)}</span></div>
        <div class="rrow"><span class="rl">零用金</span><span class="rv">${fmtMoney(bals.lingyon)}</span></div>
        <div class="divider"></div>
        <div class="rrow"><span class="rl">台企定期(B)</span><span class="rv">${fmtMoney(B)}</span></div>
        <div class="rrow"><span class="rl">農會定期(C)</span><span class="rv">${fmtMoney(C)}</span></div>
        <div class="rrow"><span class="rl">金龜現金(D)</span><span class="rv">${fmtMoney(D)}</span></div>
        <div class="rrow"><span class="rl">信徒借款(E)</span><span class="rv">${fmtMoney(E)}</span></div>
      </div>`;

  const stats = {}; RA.forEach(a => { stats[a] = monthStats(a); });
  const allMonths = [...new Set(RA.flatMap(a => Object.keys(stats[a])))].filter(Boolean).sort().reverse();

  html += allMonths.map(m => {
    const ns = stats.nonghu[m] || { in: 0, out: 0 };
    const ts = stats.taiqiye[m] || { in: 0, out: 0 };
    const ls = stats.lingyon[m] || { in: 0, out: 0 };
    return `
      <div class="rcard">
        <div class="rcard-title">${m} 月收支統計</div>
        <div class="rrow"><span class="rl">總收入</span><span class="rv ni">${fmtMoney(ns.in + ts.in + ls.in)}</span></div>
        <div class="rrow"><span class="rl">總支出</span><span class="rv no">${fmtMoney(ns.out + ts.out + ls.out)}</span></div>
        <div class="divider"></div>
        <div style="font-size:11px; color:var(--ink-soft)">分項：農會(+${Math.round(ns.in)}/-${Math.round(ns.out)}) | 台企(+${Math.round(ts.in)}/-${Math.round(ts.out)})</div>
      </div>`;
  }).join('') + `</div>`;

  document.getElementById('report-content').innerHTML = html;
}

function monthStats(acct) {
  const ms = {};
  db[acct].forEach(e => {
    const m = (e.date || '').slice(0, 6);
    if (!m) return;
    if (!ms[m]) ms[m] = { in: 0, out: 0 };
    if (e.type === 'income') ms[m].in += e.amount;
    else if (e.type === 'expense') ms[m].out += e.amount;
  });
  return ms;
}

// ── Query ─────────────────────────────────────────────────
// ─── 修正後的查詢函式：預設自動鎖定當月資料 ───
function runQuery(){
  let dateFromEl = document.getElementById('q-date-from');
  let dateToEl = document.getElementById('q-date-to');
  
  if (dateFromEl && dateToEl && !dateFromEl.value && !dateToEl.value) {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0'); 
    const today = String(now.getDate()).padStart(2, '0');      
    
    // 預設為西元格式字串
    dateFromEl.value = `${year}-${month}-01`;
    dateToEl.value = `${year}-${month}-${today}`;
  }

  const acctFilter = document.getElementById('q-acct').value;
  const typeFilter = document.getElementById('q-type').value;
  
  // 統一清洗前端輸入日期格式為 YYYY-MM-DD
  const dateFrom = dateFromEl.value.trim().replace(/\//g, '-');
  const dateTo   = dateToEl.value.trim().replace(/\//g, '-');
  const keyword  = document.getElementById('q-keyword').value.trim().toLowerCase();
  
  let results = [];
  if (typeof ACCT_KEYS !== 'undefined' && typeof db !== 'undefined') {
    ACCT_KEYS.forEach(acct => {
      if (!db[acct]) return; 
      db[acct].forEach(e => {
        const acctLabel = ACCT_META[acct].label;
        if (acctFilter && acctLabel !== acctFilter) return;
        if (typeFilter && TYPE_MAP[e.type] !== typeFilter) return;
        
        // ─── 💡 【核心修正：民國年自動相容轉換機制】 ───
        let rawDate = String(e.date || '').trim().replace(/\//g, '-');
        if (rawDate.includes('T')) {
          rawDate = rawDate.split('T')[0];
        } else {
          rawDate = rawDate.substring(0, 10);
        }
        
        // 用來進行時間邏輯比對的隱藏變數
        let compareDate = rawDate; 
        
        // 檢查是不是民國年格式 (例如：115-06-03 或 115.06.03)
        // 只要開頭是 115 且長度在 8~10 碼之間
        if (rawDate.startsWith('115-') || rawDate.startsWith('115.')) {
          // 把 115 替換成西元 2026 丟進去比對！
          compareDate = '2026' + rawDate.substring(3);
        }
        // ─── 結束民國年轉換 ───────────────────────────
        
        // 使用修正後的西元時間軸進行範圍過濾
        if (dateFrom && compareDate < dateFrom) return;
        if (dateTo && compareDate > dateTo) return;
        
        if (keyword) { 
          const h = ((e.subj || '') + (e.note || '')).toLowerCase(); 
          if (!h.includes(keyword)) return; 
        }
        
        // 顯示在畫面上時，維持您原本試算表的樣貌 (顯示民國或西元皆可)
        results.push({ ...e, date: rawDate, acctLabel });
      });
    });
  }
  
  // 依日期排序
  results.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  
  const totalIn  = results.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const totalOut = results.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
  
  document.getElementById('query-count').textContent = `共 ${results.length} 筆`;
  const statsEl = document.getElementById('query-stats');
  if (statsEl) {
    if (results.length > 0) {
      statsEl.style.display = 'grid';
      statsEl.innerHTML = `
        <div class="sum-card"><div class="sum-label"><i class="ti ti-trending-up"></i>收入合計</div><div class="sum-value g">${fmtMoney(totalIn)}</div></div>
        <div class="sum-card"><div class="sum-label"><i class="ti ti-trending-down"></i>支出合計</div><div class="sum-value r">${fmtMoney(totalOut)}</div></div>
        <div class="sum-card hl"><div class="sum-label"><i class="ti ti-calculator"></i>收支差額</div><div class="sum-value">${fmtMoney(totalIn - totalOut)}</div></div>`;
    } else { 
      statsEl.style.display = 'none'; 
    }
  }
  
  const tbody = document.getElementById('query-tbody');
  if (tbody) {
    if (results.length === 0) { 
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="ti ti-search"></i><p>查無符合資料</p></div></td></tr>`; 
      return; 
    }
    const typeTag = t => t === 'income' ? '<span class="tag in">收入</span>' : t === 'expense' ? '<span class="tag out">支出</span>' : '<span class="tag prev">結存</span>';
    tbody.innerHTML = results.map(r => `
      <tr class="dr">
        <td>${r.date}</td><td class="mu">${r.acctLabel}</td>
        <td>${r.subj || ''}</td><td class="mu">${r.note || '—'}</td>
        <td>${typeTag(r.type)}</td>
        <td><span class="${r.type === 'income' ? 'ni' : r.type === 'expense' ? 'no' : 'mu'}">${fmtMoney(r.amount)}</span></td>
      </tr>`).join('');
  }
}

// ── Excel Export（含抬頭、合計、定存、簽名欄） ─────────────
function exportExcel(){
  const wb = XLSX.utils.book_new();
  const ACCT_LABELS = {nonghu:'農會儲簿',taiqiye:'台企儲簿',lingyon:'零用金（採購）',jijin:'基金會'};
  const RA = ['nonghu','taiqiye','lingyon'];
  const A = RA.reduce((s,a)=>s+getAcctBal(a),0);
  const fixed = getFixedLatest();
  const grand = A + Object.values(fixed).reduce((s,v)=>s+v,0);

  // 從資料推算期間
  let allDates=[];
  ACCT_KEYS.forEach(a=>{ db[a].forEach(e=>{ if(e.date) allDates.push(e.date); }); });
  allDates.sort();
  const periodStr = allDates.length
    ? (allDates[0].slice(0,7) + (allDates[0].slice(0,7)!==allDates[allDates.length-1].slice(0,7) ? ' ～ '+allDates[allDates.length-1].slice(0,7) : ''))
    : '';

  ACCT_KEYS.forEach(acct=>{
    const entries = db[acct];
    if(entries.length===0) return;
    const acctName = ACCT_LABELS[acct];
    const rows=[];
    const merges=[];
    let r=0;  // current row index

    // ══ 抬頭區 ══════════════════════════════════════════
    // R0: 主標題（合併 A:F）
    rows.push(['北極殿　帳務明細報表','','','','','']);
    merges.push({s:{r,c:0},e:{r,c:5}}); r++;

    // R1: 副標題
    rows.push([`帳戶：${acctName}`, '', `期間：${periodStr}`, '', '製表日：'+new Date().toLocaleDateString('zh-TW'), '']);
    merges.push({s:{r,c:0},e:{r,c:1}});
    merges.push({s:{r,c:2},e:{r,c:3}});
    merges.push({s:{r,c:4},e:{r,c:5}}); r++;

    // R2: 空行
    rows.push(['','','','','','']); r++;

    // R3: 欄標題
    rows.push(['日期','科目／商家','摘要','收入','支出','餘額']); r++;

    // ══ 明細區 ══════════════════════════════════════════
    const dataStartRow = r;
    let running=0;
    entries.forEach(e=>{
      let inc='', exp='';
      if(e.type==='prev'){ running=e.amount; inc=e.amount; }
      else if(e.type==='income'){ running+=e.amount; inc=e.amount; }
      else{ running-=e.amount; exp=e.amount; }
      rows.push([e.date, e.subj||'', e.note||'',
        inc===''?'':inc, exp===''?'':exp, running]);
      r++;
    });

    // ══ 合計列 ══════════════════════════════════════════
    const totalIn  = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const totalOut = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    rows.push(['','','合計',totalIn,totalOut,running]); r++;
    rows.push(['','','','','','']); r++;  // 空行

    // ══ 定存 / 特殊科目（僅三個主帳戶）══════════════════
    if(RA.includes(acct)){
      const noteMap={};
      db.fixed.forEach(f=>{ if(!noteMap[f.key]) noteMap[f.key]=''; noteMap[f.key]+=(noteMap[f.key]?'、':'')+f.note; });
      [['B','台企定期（B）'],['C','農會定期（C）'],['D','金龜現金（D）'],['E','信徒借款（E）']].forEach(([k,lbl])=>{
        rows.push([lbl, noteMap[k]||'', '', fixed[k], '', '']);
        merges.push({s:{r,c:0},e:{r,c:0}});
        r++;
      });
      rows.push(['','','','','','']); r++;
      rows.push([`A＋B＋C＋D＋E＝ ${grand.toLocaleString('zh-TW')}`, '','','','','']);
      merges.push({s:{r,c:0},e:{r,c:5}}); r++;
      rows.push(['','','','','','']); r++;
    }

    // ══ 簽名欄 ══════════════════════════════════════════
    rows.push(['','','','','','']); r++;
    // 簽名標題行
    rows.push(['主　委', '', '監　委', '', '出　納', '會　計']);
    merges.push({s:{r,c:0},e:{r,c:1}});
    merges.push({s:{r,c:2},e:{r,c:3}});
    r++;
    // 簽名線行（用底線字元模擬）
    rows.push(['_______________', '', '_______________', '', '_______________', '_______________']);
    merges.push({s:{r,c:0},e:{r,c:1}});
    merges.push({s:{r,c:2},e:{r,c:3}});
    r++;
    rows.push(['','','','','','']); r++;
    // 蓋章說明
    rows.push(['※本報表經主委、監委、出納、會計簽章後生效','','','','','']);
    merges.push({s:{r,c:0},e:{r,c:5}}); r++;

    // ══ 建立工作表 ══════════════════════════════════════
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!merges'] = merges;
    ws['!cols'] = [{wch:14},{wch:20},{wch:24},{wch:13},{wch:13},{wch:14}];

    // 列高：標題列較高
    ws['!rows'] = [];
    ws['!rows'][0] = {hpt:28};  // 主標題
    ws['!rows'][1] = {hpt:18};  // 副標題
    ws['!rows'][3] = {hpt:16};  // 欄標題

    XLSX.utils.book_append_sheet(wb, ws, acctName);
  });

  if(wb.SheetNames.length===0){ alert('沒有資料可匯出'); return; }
  XLSX.writeFile(wb,'北極殿帳務_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

  // ─── 新增：權限功能、介面遮蔽與快取記住登入狀態 ─────────────────────────

async function gsReq(params) {
  // 這裡會自動讀取您原本宣告在最頂端的 GS_URL 變數
  if (!GS_URL) {
    throw new Error('未設定 GS_URL 變數，請檢查網頁頂端設定');
  }
  
  // 將物件參數動態轉換為網址後的網址字串 (Query String)
  const url = GS_URL + '?' + new URLSearchParams(params).toString();
  
  // 發送非同步請求給 Google Apps Script 後端
  const response = await fetch(url, {
    method: 'GET'
  });
  
  if (!response.ok) {
    throw new Error('網路回應錯誤，無法連線至後端');
  }
  
  // 解析後端傳回的 JSON 資料
  return await response.json();
}
async function submitLogin() {
  const user = document.getElementById('login-user').value;
  const pwd = document.getElementById('login-pwd').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');

  if (!user || !pwd) {
    err.innerText = "請輸入帳號與密碼";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2 animate-spin"></i> 驗證中...';
  err.innerText = "";

  try {
    // 呼叫後端 GAS
    const res = await gsReq({ action: 'login', username: user, password: pwd });

    if (res.success) {
      // 1. 驗證成功，移除登入遮罩，讓後方主畫面露出來
      document.getElementById('login-overlay').style.display = 'none';
      
      // 2. 【大補帖】把所有可能用到的權限儲存方式一次塞滿，讓原本系統絕對讀得到！
      window.userRole = res.role;                                // 記憶體儲存
      sessionStorage.setItem('beiji_user_role', res.role);       // 新版網頁儲存
      sessionStorage.setItem('userRole', res.role);             // 舊版網頁儲存
      
      console.log("登入成功，角色為:", res.role);

      // 3. 強制通知系統「立刻重新檢查並套用權限」
      if (typeof applyRolePermissions === 'function') {
        applyRolePermissions();
      }
      
      // 4. 如果系統有需要重新載入或初始化的動作，就在這裡順便執行
      if (typeof initializeSystem === 'function') {
        initializeSystem();
      }
    } else {
      err.innerText = res.message || "帳號或密碼錯誤";
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> 安全登入';
    }
  } catch (e) {
    console.error(e);
    err.innerText = "連線異常，請確認 GAS 是否已發布";
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> 安全登入';
  }
}

// ─── 修改後的權限套用函式 ─────────────────────────────────────
function applyRolePermissions() {
  const role = sessionStorage.getItem('beiji_user_role') || window.userRole || '一般';
  console.log("正在套用權限，當前角色為:", role);
  
  const allTabs = document.querySelectorAll('.tabs-bar .tab-btn');
  allTabs.forEach(btn => btn.style.display = ''); // 先全部還原顯示
  
  let styleEl = document.getElementById('role-style-override');
  if (styleEl) styleEl.innerHTML = ''; // 清除舊樣式

  if (role === '一般') {
    // 一般權限：只保留查詢(query)與月報表(report)
    allTabs.forEach(btn => {
      const onclickAttr = btn.getAttribute('onclick') || '';
      if (!onclickAttr.includes('query') && !onclickAttr.includes('report')) {
        btn.style.display = 'none'; 
      }
    });
    injectTemplateStyles(`
      .btn.danger, #fx-add-btn, .panel-hdr .btn.primary, .form-grid { display: none !important; }
    `);
    
  } else if (role === '會計') {
    // 會計權限：不能刪除資料
    injectTemplateStyles(`
      .btn.danger { display: none !important; } 
    `);
    
  } else if (role === '管理員') {
    // 💡 溫和無害版：管理員全功能開放，我們不硬性去改 main 或 table 的 display 樣式，
    // 只確保危險的刪除按鈕跟記帳面板能順利露出來，畫面就絕對不會歪掉了！
    injectTemplateStyles(`
      .btn.danger { display: inline-flex !important; }
    `);
    allTabs.forEach(btn => btn.style.display = ''); 
  }
}

// 輔助函式：確保樣式注入不會蓋掉主畫面
function injectTemplateStyles(cssText) {
  let styleEl = document.getElementById('role-style-override');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'role-style-override';
    document.head.appendChild(styleEl);
  }
  styleEl.innerHTML = cssText;
}

// ─── 修正後的系統初始化函式 (強迫等待雲端同步完成，再開放查詢) ───
async function initializeSystem() {
  // 1. 先確認並套用最高權限
  applyRolePermissions(); 

  // 2. 載入定存快取 (如果原本系統有這個函式)
  if (typeof loadFixed === 'function') loadFixed(); 
  
  // 3. 【核心修正】同部雲端帳簿明細，並強制使用 await 等待它完全下載完畢
  if (typeof loadFromGS === 'function') {
    setStatus('loading', '雲端資料同步中...'); // 如果系統有狀態列，顯示同步中
    
    // 💡 關鍵：必須等 loadFromGS() 真正把所有分頁資料從 GAS 抓回來並存入 db
    const success = await loadFromGS(); 
    
    if (success) {
      setStatus('ok', '同步完成');
      
      // 4. 確保資料都進到 db 後，再切換到查詢分頁
      switchTab('query');
      
      // 5. 強制觸發一次預設查詢，把剛剛從雲端抓下來的歷史資料統統畫出來！
      if (typeof runQuery === 'function') {
        console.log("雲端資料下載完畢，開始預設查詢...");
        runQuery(); 
      }
    } else {
      setStatus('err', '雲端同步失敗');
      alert('同步雲端資料失敗，請確認網路或重新整理網頁。');
    }
  }
}

// ─── 修改：具有權限檢查功能的 Tab 切換 ─────────────────────────
function switchTab(name) {
  const role = sessionStorage.getItem('beiji_user_role') || '一般';
  if (role === '一般' && name !== 'query' && name !== 'report') {
    alert('您的權限層級無法存取記帳功能。');
    return;
  }
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  const targetPane = document.getElementById('tab-' + name);
  const targetBtn = document.querySelector(`[data-tab="${name}"]`);
  if (targetPane) targetPane.style.display = '';
  if (targetBtn) targetBtn.classList.add('active');
  
  if (name === 'report') renderReport();
  else if (ACCT_KEYS.includes(name)) renderAcct(name);
  else if (name === 'fixed') renderFixed();
}

// ─── 修正：網頁初始化守衛 (解決網頁重新整理資料遺失的問題) ──────────────
window.onload = async function() {
  const isAuthed = sessionStorage.getItem('beiji_logged_in');
  if (isAuthed === 'true') {
    document.getElementById('login-overlay').style.display = 'none';
    await initializeSystem();
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('login-user').focus();
  }
};
