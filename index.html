<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九肉北極殿帳務管理系統</title>
  
 <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  
</head>

<body>
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <div style="font-size: 40px; color: var(--gold); margin-bottom: 10px;"><i class="ti ti-lock-square-rounded"></i></div>
    <div class="login-title">九肉北極殿帳務管理系統</div>
    <div class="login-subtitle">請輸入權限帳密以進行審閱</div>
    
    <div class="fg">
      <label>使用帳號</label>
      <input type="text" id="login-user" placeholder="例如: admin"/>
    </div>
    
    <div class="fg" style="margin-bottom: 1.2rem;">
      <label>管理密碼</label>
      <input type="password" id="login-pwd" placeholder="•••••" onkeydown="if(event.key==='Enter') submitLogin()"/>
    </div>
    
    <button class="btn primary login-btn" id="login-btn" onclick="submitLogin()">
      <i class="ti ti-login"></i> 安全登入
    </button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>
<header class="site-header">
  <div class="site-logo"><i class="ti ti-building-temple"></i><span class="logo-wrap"><span class="logo-main">九肉北極殿</span><span class="logo-sub">帳務管理系統</span></span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="sync-status loading" id="sync-status"><i class="ti ti-cloud spin"></i>連線中…</span>
    <button class="btn ghost" onclick="exportPDF()"><i class="ti ti-file-text"></i>匯出／列印 PDF</button>
    <button class="btn ghost" onclick="logoutUser()"><i class="ti ti-logout"></i>登出</button>
  </div>
</header>

<nav class="tabs-bar mobile-tabs-scroll">
  <button class="tab-btn active" onclick="switchTab('lingyon')" data-tab="lingyon"><i class="ti ti-wallet" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>零用金（採購）</button>
  <button class="tab-btn" onclick="switchTab('nonghu')" data-tab="nonghu"><i class="ti ti-pig-money" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>農會儲簿</button>
  <button class="tab-btn" onclick="switchTab('taiqiye')" data-tab="taiqiye"><i class="ti ti-building-bank" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>台企儲簿</button>
  <button class="tab-btn" onclick="switchTab('fixed')" data-tab="fixed"><i class="ti ti-lock" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>定存 / 特殊</button>
  <button class="tab-btn" onclick="switchTab('report')" data-tab="report"><i class="ti ti-chart-bar" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>月報總表</button>
  <button class="tab-btn" onclick="switchTab('jijin')" data-tab="jijin"><i class="ti ti-star" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>基金會</button>
  <button class="tab-btn" onclick="switchTab('query')" data-tab="query"><i class="ti ti-search" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>查詢</button>
</nav>

<main class="main">
  <div id="tab-nonghu" class="tab-pane" style="display:none"></div>
  <div id="tab-taiqiye" class="tab-pane" style="display:none"></div>
  <div id="tab-lingyon" class="tab-pane" style="display:none"></div>
  <div id="tab-jijin" class="tab-pane" style="display:none"></div>

  <!-- 定存 / 特殊 -->
  <div id="tab-fixed" class="tab-pane" style="display:none">
    <div class="summary-row" id="fixed-stats"></div>
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title"><i class="ti ti-plus"></i>新增 / 更新定存與特殊科目</span></div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="fg"><label>民國年月</label><input type="text" id="fx-month" placeholder="107.01"/></div>
          <div class="fg"><label>科目／商家</label>
            <select id="fx-key">
              <option value="B">台企定期（B）</option>
              <option value="C">農會定期（C）</option>
              <option value="D">金龜現金（D）</option>
              <option value="E">信徒借款（E）</option>
            </select>
          </div>
          <div class="fg"><label>金額</label><input type="number" id="fx-amount" placeholder="0" min="0" inputmode="numeric" pattern="[0-9]*"/></div>
          <div class="fg"><label>備註</label><input type="text" id="fx-note" placeholder="…"/></div>
          <div class="fg"><label>&nbsp;</label><button class="btn primary" id="fx-add-btn" onclick="addFixed()"><i class="ti ti-plus"></i>新增</button></div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span class="panel-title"><i class="ti ti-list"></i>定存 / 特殊科目明細</span></div>
      <div class="table-wrap">
        <table><thead><tr>
          <th style="width:80px">年月</th><th style="width:160px">科目／商家</th>
          <th style="width:130px">金額</th><th>備註</th><th style="width:44px"></th>
        </tr></thead><tbody id="fx-tbody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- 月報總表 -->
  <div id="tab-report" class="tab-pane" style="display:none">
    <div class="panel">
      <div class="panel-hdr">
        <span class="panel-title"><i class="ti ti-chart-bar"></i>月報總表</span>
        <button class="btn export" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i>匯出 Excel</button>
      </div>
      <div class="panel-body" id="report-content"></div>
    </div>
  </div>

  <!-- 查詢分頁 -->
<div id="tab-query" class="tab-pane" style="display:none">
  
 

  <div id="query-stats" style="display:none; clear: both; width: 100%; margin-bottom: 25px; grid-template-columns: repeat(3, 1fr); gap: 15px;">
    </div>

  <div class="panel" style="background: var(--paper, #ffffff) !important; border-radius: var(--radius, 8px); box-shadow: 0 2px 12px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 25px;">
    
    <div style="margin-bottom: 18px; display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 15px; color: var(--ink, #000000);">
      <i class="ti ti-search" style="color: var(--gold, #bfa15f);"></i> 查詢條件
    </div>

    <div class="q-container" style="clear: both;">
      
      <div class="q-field-acct">
        <label class="q-label-style">帳戶</label>
        <select id="q-acct" class="q-input-style">
          <option value="">全部帳戶</option>
          <option value="農會儲簿">農會儲簿</option>
          <option value="台企儲簿">台企儲簿</option>
          <option value="零用金（採購）">零用金（採購）</option>
          <option value="基金會">基金會</option>
        </select>
      </div>

      <div class="q-field-type">
        <label class="q-label-style">類型</label>
        <select id="q-type" class="q-input-style">
          <option value="">全部類型</option>
          <option value="收入">收入</option>
          <option value="支出">支出</option>
          <option value="上期結存">上期結存</option>
        </select>
      </div>

      <div class="q-field-dates">
        <div>
          <label class="q-label-style">起始日期</label>
          <input type="date" id="q-date-from" class="q-input-style" style="cursor: pointer;"/>
        </div>
        <div>
          <label class="q-label-style">結束日期</label>
          <input type="date" id="q-date-to" class="q-input-style" style="cursor: pointer;"/>
        </div>
      </div>

      <div class="q-field-keyword">
        <label class="q-label-style">關鍵字搜尋</label>
        <input type="text" id="q-keyword" class="q-input-style" placeholder="科目 / 摘要關鍵字"/>
      </div>

      <div class="q-field-btn">
        <button class="btn primary" onclick="runQuery()" style="height: 42px; width: 100%; padding: 0 20px; display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; cursor: pointer; font-weight: bold; font-size: 14px; box-sizing: border-box; border-radius: var(--radius, 8px);">
          <i class="ti ti-search"></i> 執行查詢
        </button>
      </div>

    </div> </div> <div style="margin-top: 10px; clear: both;">
    <div style="margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;">
      <h3 style="font-size: 14px; color: var(--ink, #000000); font-weight: bold; margin: 0; display: flex; align-items: center; gap: 6px;">
        <i class="ti ti-list" style="color: var(--gold, #bfa15f);"></i> 查詢結果明細
      </h3>
      <div id="query-count" style="font-size: 12px; color: var(--ink-soft);">共 0 筆</div>
    </div>
    
    <div class="table-responsive" style="width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--paper, #ffffff); border-radius: var(--radius, 8px); box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--paper-dark, #f0f0f0);">
      <table class="table" style="width: 100%; min-width: 620px; border-collapse: collapse; background: var(--paper, #ffffff) !important;">
        <thead>
          <tr style="background: var(--paper-dark, #f5f5f5); text-align: left; border-bottom: 1px solid var(--paper-dark);">
            <th style="padding: 10px 8px; color: var(--ink-soft); font-weight: 600; white-space: nowrap;">日期</th>
            <th style="padding: 10px 8px; color: var(--ink-soft); font-weight: 600; white-space: nowrap;">帳戶</th>
            <th style="padding: 10px 8px; color: var(--ink-soft); font-weight: 600; white-space: nowrap;">科目</th>
            <th style="padding: 10px 8px; color: var(--ink-soft); font-weight: 600; white-space: nowrap;">摘要</th>
            <th style="padding: 10px 8px; color: var(--ink-soft); font-weight: 600; white-space: nowrap;">類型</th>
            <th style="padding: 10px 8px; text-align: right; color: var(--ink-soft); font-weight: 600; white-space: nowrap;">金額</th>
            <th style="padding: 10px 8px; text-align: center; color: var(--ink-soft); font-weight: 600; white-space: nowrap;">操作</th>
          </tr>
        </thead>
        <tbody id="query-tbody" style="background: var(--paper, #ffffff) !important;">
          </tbody>
      </table>
    </div>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
